{d:"YANG",q:"What is YANG in the context of network management?",o:["A scripting language for Cisco devices","A data modeling language used to describe the structure of configuration and operational data for NETCONF/RESTCONF","A replacement for BGP route maps","An IETF encryption standard"],a:1,e:"<strong>YANG (RFC 7950)</strong> is a data modeling language that defines the structure, syntax, and semantics of data exchanged via NETCONF and RESTCONF. It is the schema language for model-driven management."},
{d:"YANG",q:"In YANG, what is the purpose of the 'container' node type?",o:["Stores a single scalar value","Groups related data nodes without requiring a key or having a value itself","Defines a repeatable list with a unique key","Restricts a leaf to specific enumerated values"],a:1,e:"A YANG <strong>container</strong> is a grouping node. It has no value itself but contains child nodes (leaves, leaf-lists, nested containers, lists). Example: <code>container interface { leaf name; leaf enabled; }</code>"},
{d:"YANG",q:"Which YANG statement identifies the unique key for instances in a list?",o:["unique","identity","key","index"],a:2,e:"The <strong>key</strong> statement in a YANG list designates one or more leaf values as the unique identifier for list entries. This is analogous to a primary key in a relational database."},
{d:"YANG",q:"What encoding does NETCONF use natively to carry YANG-modeled data?",o:["JSON","Protobuf","XML","CBOR"],a:2,e:"NETCONF (RFC 6241) mandates <strong>XML encoding</strong>. RESTCONF (RFC 8040) supports both XML (application/yang-data+xml) and JSON (application/yang-data+json). gNMI uses Protobuf or JSON."},
{d:"YANG",q:"Which command on IOS-XE displays all YANG modules supported by the device with their revision dates?",o:["show yang modules","show netconf-yang modules","show restconf modules","show yang capabilities"],a:1,e:"<strong>show netconf-yang modules</strong> lists all YANG modules supported, their namespaces, and revision dates. This is essential before building NETCONF RPCs to ensure the module exists on the target device."},
{d:"YANG",q:"What does the YANG 'leaf-list' type represent?",o:["A list with a key identifier","Multiple scalar values of the same type without keys","A container with optional child nodes","A choice between different data types"],a:1,e:"A <strong>leaf-list</strong> holds zero or more values of the same type without requiring keys. Example: a list of DNS server IPs or SNMP community strings. Contrast with 'list' which has structured entries with keys."},
{d:"YANG",q:"Which YANG feature allows a node to be conditionally present only when an XPath expression evaluates to true?",o:["must","when","presence","mandatory"],a:1,e:"The <strong>when</strong> statement makes a node conditional — it only exists in the data tree if the specified XPath condition is true. 'must' validates a constraint that must always be true when the node is present."},
{d:"YANG",q:"What is the purpose of a YANG 'grouping' statement?",o:["Defines mandatory configuration nodes","Creates a reusable schema fragment referenced via 'uses' statement","Specifies list key ordering","Restricts a leaf to a numeric range"],a:1,e:"<strong>grouping</strong> defines a reusable set of nodes. Other parts of the YANG model reference it with <strong>uses</strong>. This promotes reuse and consistency — similar to a template or class in programming."},
{d:"YANG",q:"Which benefit does YANG data modeling provide over traditional CLI-based management?",o:["Faster CLI command processing","Structured, machine-readable schemas enabling automated validation, parsing, and vendor-agnostic tooling","Lower CPU usage on managed devices","Eliminates the need for authentication"],a:1,e:"YANG provides <strong>structured schemas</strong> that allow tools to validate configurations programmatically before applying them, parse responses as data structures, and build vendor-agnostic automation pipelines."},
{d:"YANG",q:"What is the YANG 'revision' statement used for?",o:["Specifies the YANG specification version (1.0 or 1.1)","Records the date and description of a module update for version tracking","Defines the vendor that created the module","Sets the encoding format for the module"],a:1,e:"The <strong>revision</strong> statement records the date (YYYY-MM-DD) and change description for each module update. Clients should check the revision to ensure compatibility with expected module features."},
{d:"YANG",q:"Which XPath filter in a NETCONF get-config selects only interface GigabitEthernet1?",o:["<filter>/interfaces/interface</filter>","<filter type='subtree'><interfaces><interface><name>GigabitEthernet1</name></interface></interfaces></filter>","<filter type='xpath' select='/interface[1]'/>","<filter type='subtree'><GigabitEthernet1/></filter>"],a:1,e:"NETCONF subtree filters use XML element hierarchy. To select a specific list entry, include the <strong>key element</strong> (<name>) inside the filter. XPath filters use 'type=xpath select=...' with an XPath expression."},
{d:"YANG",q:"Which protocol infers that a YANG data model is being used based on the blueprint?",o:["SNMP","NX-API CLI","RESTCONF","Syslog"],a:2,e:"<strong>RESTCONF</strong> is inherently YANG-based (RFC 8040). NETCONF also uses YANG. SNMP uses MIBs. The presence of /restconf/data/ URIs with module:node syntax implies YANG modeling."},

// ──────────────────────────────────────────────
// 6.4 APIs  (15 questions)
// ──────────────────────────────────────────────
{d:"API",q:"What is the first API call required to interact with Cisco Catalyst Center?",o:["GET /dna/intent/api/v1/network-device","POST /dna/system/api/v1/auth/token with Basic Auth credentials","GET /dna/intent/api/v1/site","POST /dna/intent/api/v1/network-device/provision"],a:1,e:"Authentication is always first: <strong>POST /dna/system/api/v1/auth/token</strong> with Base64-encoded username:password in the Authorization header. The returned token is used in all subsequent requests as X-Auth-Token."},
{d:"API",q:"Which HTTP header must be included in every Catalyst Center API request after authentication?",o:["Authorization: Bearer <token>","X-Auth-Token: <token>","API-Key: <token>","Cookie: JSESSIONID=<token>"],a:1,e:"Catalyst Center uses the proprietary header <strong>X-Auth-Token: &lt;jwt-token&gt;</strong>. This differs from the standard OAuth Bearer scheme. The token expires and must be refreshed periodically."},
{d:"API",q:"Which Catalyst Center API endpoint retrieves the complete list of managed network devices?",o:["/dna/intent/api/v1/topology/physical-topology","/dna/intent/api/v1/network-device","/dna/intent/api/v1/site-health","/dna/system/api/v1/network-device"],a:1,e:"<strong>GET /dna/intent/api/v1/network-device</strong> returns the device inventory. Use query parameters like ?hostname=R1 or ?managementIpAddress= to filter results."},
{d:"API",q:"Which Catalyst Center API is used to check the reachability status of a specific device?",o:["GET /dna/intent/api/v1/network-device/{id}/config","GET /dna/intent/api/v1/network-device/{id}","GET /dna/intent/api/v1/network-device/count","POST /dna/intent/api/v1/network-device/sync"],a:1,e:"<strong>GET /dna/intent/api/v1/network-device/{id}</strong> returns detailed info for a specific device including 'reachabilityStatus' (Reachable/Unreachable) and 'reachabilityFailureReason'."},
{d:"API",q:"Which vManage API endpoint is used for initial session authentication?",o:["POST /dataservice/auth/token","GET /dataservice/device","POST /j_security_check","GET /v1/auth/login"],a:2,e:"vManage uses form-based auth via <strong>POST /j_security_check</strong> with j_username and j_password fields. The response sets a JSESSIONID cookie used for subsequent API calls. Some versions also require a CSRF token."},
{d:"API",q:"Which vManage endpoint returns real-time device statistics including CPU and memory?",o:["/dataservice/template/device","/dataservice/device/hardwarehealth/detail","/dataservice/statistics/device","/dataservice/device/action/template/push"],a:2,e:"<strong>/dataservice/statistics/device</strong> provides operational statistics. /dataservice/device/hardwarehealth/detail provides hardware health. /dataservice/template/device handles configuration templates."},
{d:"API",q:"What is the Catalyst Center 'Intent API' designed to do?",o:["Monitor SNMP traps in real-time","Translate business intent into device configuration and automate network provisioning","Replace CLI on all managed devices","Provide raw SSH access to devices"],a:1,e:"The <strong>Intent API</strong> is Catalyst Center's primary northbound API. It abstracts network complexity and allows operators to express what they want (intent) — provisioning, policies, templates — without device-level specifics."},
{d:"API",q:"Which SD-WAN component provides the northbound REST API for vManage automation?",o:["vEdge","vBond","vSmart","vManage"],a:3,e:"<strong>vManage</strong> is the management plane with GUI and full REST API. vSmart handles policy/routing distribution. vBond orchestrates onboarding. vEdge/cEdge are the WAN edge data plane devices."},
{d:"API",q:"What does the Catalyst Center API response field 'reachabilityFailureReason: Authentication Failed' indicate?",o:["The Catalyst Center server cannot be reached","Catalyst Center cannot authenticate to the device (wrong credentials)","The device's SNMP is misconfigured","The API token has expired"],a:1,e:"'Authentication Failed' in reachabilityFailureReason means Catalyst Center has <strong>incorrect credentials configured for that device</strong>. It can reach the device IP but cannot log in. Fix the device credential profile."},
{d:"API",q:"Which Catalyst Center API feature uses AI/ML to baseline network behavior and identify anomalies?",o:["SWIM","Path Trace","AI Network Analytics / Assurance","Command Runner"],a:2,e:"Catalyst Center <strong>AI Network Analytics</strong> uses machine learning to establish dynamic baselines for clients, applications, and infrastructure. Deviations trigger issues with root cause analysis and guided remediation."},
{d:"API",q:"What is the function of the Catalyst Center Template Editor API?",o:["Retrieves running configurations from devices","Creates and deploys parameterized Jinja2/Velocity configuration templates to devices","Manages software upgrades","Monitors network topology changes"],a:1,e:"The <strong>Template Editor API</strong> allows creating configuration templates with variables (using Velocity or Jinja2) and deploying them to multiple devices with device-specific values — enabling standardized configuration deployment at scale."},
{d:"API",q:"In the vManage API, which operation attaches a feature template to a list of WAN edge devices?",o:["GET /dataservice/template/device/object/{id}","POST /dataservice/template/device/config/attachfeature","DELETE /dataservice/template/device/{id}","GET /dataservice/device"],a:1,e:"<strong>POST /dataservice/template/device/config/attachfeature</strong> with a payload containing the template ID and target device list triggers template attachment. The response includes a task ID to track the operation's progress."},
{d:"API",q:"Catalyst Center's physical network hierarchy is structured by:",o:["Device role (access, distribution, core)","Geographic location (Global → Area → Building → Floor)","VLAN assignment","BGP AS number"],a:1,e:"Catalyst Center organizes devices in a <strong>location hierarchy</strong>: Global → Area → Building → Floor. This allows location-based policy application, RF planning, and logical grouping of devices for management."},
{d:"API",q:"What does the Catalyst Center SWIM (Software Image Management) workflow manage?",o:["SNMP trap collection","Device software image compliance checking, distribution, and upgrade automation","NetFlow data collection","BGP routing policy"],a:1,e:"<strong>SWIM</strong> manages the entire software lifecycle: maintaining a golden image repository, checking device compliance against golden images, distributing images to devices, and automating upgrades with pre/post-checks."},
{d:"API",q:"What does Catalyst Center's southbound API provide?",o:["Interface to business applications for intent expression","Interface between the controller and network devices for configuration and telemetry","REST API for external orchestration systems","Authentication services for end users"],a:1,e:"<strong>Southbound APIs</strong> (NETCONF, CLI, SNMP, REST) communicate with the network devices. Northbound APIs (REST/Intent API) communicate with applications and orchestration systems above the controller."},

// ──────────────────────────────────────────────
// 6.5 REST / RESTCONF  (12 questions)
// ──────────────────────────────────────────────
{d:"REST",q:"A RESTCONF GET request returns HTTP 404. What does this indicate?",o:["Authentication failed","The requested YANG node or resource does not exist on the device","Internal server error","Method not allowed"],a:1,e:"<strong>404 Not Found</strong> means the specified RESTCONF URI path does not map to an existing YANG node or configured resource. Check the module name, node path, and list key in the URI."},
{d:"REST",q:"Which HTTP method in RESTCONF applies partial modifications to an existing resource (without replacing it entirely)?",o:["POST","PUT","PATCH","DELETE"],a:2,e:"<strong>PATCH</strong> applies partial updates — only the specified elements are changed. <strong>PUT</strong> replaces the entire resource. Using PUT when you intend PATCH can accidentally delete unconfigured attributes."},
{d:"REST",q:"What HTTP status code is returned by RESTCONF after a successful DELETE operation?",o:["200 OK","201 Created","204 No Content","202 Accepted"],a:2,e:"A successful RESTCONF DELETE returns <strong>204 No Content</strong>, indicating success with no response body. Code 200 includes a body. Code 204 is the standard REST success for DELETE/PUT/PATCH with no return data."},
{d:"REST",q:"Which IOS-XE global command enables the RESTCONF agent?",o:["ip http restconf","restconf","ip restconf enable","netconf-yang restconf"],a:1,e:"The single global command <strong>restconf</strong> enables the RESTCONF agent on IOS-XE. HTTPS (ip http secure-server) is also required since RESTCONF operates over HTTPS (TCP 443)."},
{d:"REST",q:"What is the RESTCONF base URI path for configuration data on IOS-XE?",o:["/api/data/","/netconf/data/","/restconf/data/","/yang/config/"],a:2,e:"RESTCONF RFC 8040 defines <strong>/restconf/data/</strong> as the root for configuration and state data. Operations (RPCs) are under /restconf/operations/. The root is discovered via /restconf/.well-known/host-meta."},
{d:"REST",q:"A script sends a RESTCONF PATCH with application/yang-data+json and receives 409. What is the likely cause?",o:["Wrong credentials","The resource doesn't exist","Configuration conflict or constraint violation","Syntax error in the JSON body"],a:2,e:"HTTP <strong>409 Conflict</strong> indicates the requested change conflicts with the current resource state — e.g., a uniqueness constraint violation, a dependency not met, or a concurrent modification conflict."},
{d:"REST",q:"Which REST API security method should be used in production to prevent MITM attacks?",o:["Basic Auth over HTTP","API Key in URL query string","HTTPS with SSL/TLS certificate validation","MD5 hash of request body"],a:2,e:"<strong>HTTPS with proper TLS certificate validation</strong> is mandatory in production. It encrypts traffic (preventing eavesdropping) and authenticates the server (preventing MITM). HTTP basic auth without TLS sends credentials in cleartext."},
{d:"REST",q:"What does HTTP status 401 mean in the context of a Catalyst Center API call?",o:["Resource not found","Rate limit exceeded","Authentication failed — token is missing, invalid, or expired","Server-side error"],a:2,e:"<strong>401 Unauthorized</strong> means the authentication credentials are invalid or missing. For Catalyst Center, re-authenticate with POST /dna/system/api/v1/auth/token to get a fresh X-Auth-Token."},
{d:"REST",q:"Which RESTCONF query parameter limits the response to specific leaf nodes, reducing payload size?",o:["?depth=","?filter=","?fields=","?select="],a:2,e:"The <strong>?fields=</strong> query parameter (RFC 8040 Section 4.8.3) restricts the response to named leaves. Example: ?fields=name;enabled;ip-address returns only those three fields from an interface object."},
{d:"REST",q:"The response code 204 was returned when a RESTCONF DELETE was performed on a loopback interface. This means:",o:["The interface was not found","The DELETE method is not supported","The interface was successfully deleted; there is no response body","The request is queued for processing"],a:2,e:"<strong>204 No Content</strong> confirms a successful operation with no response body. For DELETE in RESTCONF, this is the expected success code. The loopback interface has been removed from the configuration."},
{d:"REST",q:"What protocol does REST API use to secure the communication channel?",o:["SSH","HTTPS (TLS)","DTLS","IPsec"],a:1,e:"REST APIs use <strong>HTTPS (HTTP over TLS)</strong> for secure communication. TLS provides encryption, integrity, and server authentication. HTTP alone (without TLS) exposes credentials and data to interception."},
{d:"REST",q:"In the RESTCONF URI '/restconf/data/ietf-interfaces:interfaces/interface=GigabitEthernet1', what does 'ietf-interfaces:interfaces' represent?",o:["The server hostname","The YANG module name prefix and top-level container path","The VLAN ID for the interface","The RESTCONF API version"],a:1,e:"<strong>module-name:node-name</strong> is the RESTCONF URI format. 'ietf-interfaces' is the YANG module name; 'interfaces' is the top-level container. This prefix notation resolves namespace ambiguity between different modules."},

// ──────────────────────────────────────────────
// 6.6 EEM  (13 questions)
// ──────────────────────────────────────────────
{d:"EEM",q:"What is Cisco EEM (Embedded Event Manager) used for?",o:["Replacing Ansible for external automation","On-device event-driven automation — detecting events and executing actions without external management","Providing a Python runtime on routers","Streaming telemetry to a collector"],a:1,e:"<strong>EEM</strong> monitors device events (syslog patterns, timers, SNMP thresholds, CLI commands) and triggers automated actions (CLI commands, email, syslog, SNMP traps) entirely on-device."},
{d:"EEM",q:"Which EEM event detector triggers an applet when a specific syslog message pattern is detected?",o:["event timer watchdog","event snmp oid","event syslog pattern","event cli pattern"],a:2,e:"<strong>event syslog pattern \"&lt;regex&gt;\"</strong> triggers the applet when a syslog message matches the regular expression. This is the most common EEM trigger for operational automation."},
{d:"EEM",q:"What EEM action executes a CLI command from within an applet?",o:["action 1.0 cli run","action 1.0 cli command \"cmd\"","action exec \"cmd\"","action 1.0 run command \"cmd\""],a:1,e:"<strong>action &lt;label&gt; cli command \"&lt;cmd&gt;\"</strong> executes a CLI command. Example: 'action 1.0 cli command \"show interface brief\"'. The output is available in $_cli_result."},
{d:"EEM",q:"An EEM applet uses 'event none'. How is this applet triggered?",o:["Automatically at device boot","Never — it is disabled","Manually with: event manager run <applet-name>","When any log message occurs"],a:2,e:"<strong>event none</strong> means no automatic trigger. The applet is invoked manually from the CLI with <strong>event manager run &lt;name&gt;</strong>. Useful for on-demand tasks or testing."},
{d:"EEM",q:"Which EEM timer type triggers an applet at a scheduled time using cron-style syntax?",o:["event timer watchdog","event timer cron","event timer countdown","event timer periodic"],a:1,e:"<strong>event timer cron cron-entry \"&lt;cron-spec&gt;\"</strong> uses cron syntax (minute hour day month weekday) for scheduled execution. watchdog triggers periodically; countdown fires once after a delay."},
{d:"EEM",q:"What does 'sync yes' mean in an EEM CLI event trigger?",o:["The applet runs asynchronously in the background","The triggering CLI command is blocked until the EEM applet completes execution","The event fires only once","The applet syncs state with a peer router"],a:1,e:"<strong>sync yes</strong> blocks the triggering CLI command until the EEM applet finishes. <strong>sync no</strong> (default) runs the applet concurrently. sync yes is useful when the applet must validate or modify the command before it executes."},
{d:"EEM",q:"Which EEM action sends an email notification from an applet?",o:["action 1.0 email","action 1.0 notify email","action 1.0 mail server X.X.X.X to Y from Z subject S body B","action 1.0 smtp send"],a:2,e:"<strong>action &lt;n&gt; mail server &lt;ip&gt; to &lt;addr&gt; from &lt;addr&gt; subject &lt;text&gt; body &lt;text&gt;</strong> sends email. Requires 'event manager mail-server &lt;ip&gt;' global configuration."},
{d:"EEM",q:"What EEM action generates a user-defined syslog message?",o:["action 1.0 syslog msg \"text\"","action 1.0 log \"text\"","action 1.0 write syslog \"text\"","action 1.0 notify syslog \"text\""],a:0,e:"<strong>action &lt;n&gt; syslog msg \"&lt;message&gt;\"</strong> generates a syslog entry from the EEM applet. The severity can also be specified. This is commonly used for operational logging and alerting."},
{d:"EEM",q:"Which EEM event detector fires when an SNMP OID crosses a defined threshold?",o:["event syslog","event cli pattern","event snmp oid","event ipsla"],a:2,e:"<strong>event snmp oid &lt;OID&gt; get-type &lt;type&gt; entry-op &lt;op&gt; entry-val &lt;value&gt;</strong> triggers when the polled OID meets the specified condition. This enables threshold-based automation using SNMP data."},
{d:"EEM",q:"A CCNP engineer needs an applet to capture the output of 'show version' and store it in a variable. Which two actions achieve this?",o:["action cli command / action set","action exec / action puts","action cli command \"show version\" / action regexp to parse $_cli_result","action run \"show version\" / action capture"],a:2,e:"First: <strong>action cli command \"show version\"</strong> stores output in <strong>$_cli_result</strong>. Then: <strong>action regexp</strong> or <strong>action set</strong> can parse/store specific values from that output string."},
{d:"EEM",q:"What privilege level is typically required for an EEM applet to execute privileged EXEC commands?",o:["Privilege 1 (user mode)","Privilege 7","Privilege 15","No privilege — EEM bypasses AAA"],a:2,e:"EEM applets run under the <strong>privilege 15</strong> context by default when 'event manager applet X authorization bypass' is used, or when the triggering user has priv 15. This is required for show and configuration commands."},
{d:"EEM",q:"Which global command specifies the directory containing user-defined EEM Tcl policy scripts?",o:["event manager directory user policy flash:/eem/","event manager policy-dir flash:/eem/","event manager applet-dir flash:/eem/","event manager tcl-dir flash:/eem/"],a:0,e:"<strong>event manager directory user policy &lt;path&gt;</strong> sets the directory for full Tcl-based EEM policy scripts. EEM applets (the keyword-based variety) don't require a directory — they're stored in the running config."},
{d:"EEM",q:"What is the EEM 'action exit-status' used for?",o:["Terminates the router process","Specifies the exit code returned when the applet completes — non-zero can indicate failure","Exits from a specific CLI exec session","Logs the applet completion to syslog"],a:1,e:"<strong>action &lt;n&gt; exit-status &lt;value&gt;</strong> sets the return code when the applet terminates. A non-zero value signals failure to calling processes. Combined with sync yes, this can prevent a CLI command from executing."},

// ──────────────────────────────────────────────
// 6.7 ORCHESTRATION  (13 questions)
// ──────────────────────────────────────────────
{d:"ORCH",q:"What is the fundamental difference between agent-based and agentless orchestration?",o:["Agent-based tools use SSH; agentless use SNMP","Agent-based tools require software (daemon) installed on each managed node; agentless connect via existing protocols like SSH","Agentless tools only work with Linux","Agent-based tools are always more secure"],a:1,e:"<strong>Agent-based</strong> (Puppet, Chef) require a daemon on each managed node. <strong>Agentless</strong> (Ansible, NAPALM) use SSH/APIs with no pre-installed agent. Agentless is simpler to deploy; agents provide real-time drift detection."},
{d:"ORCH",q:"Which orchestration tool is agentless and uses SSH/network APIs with YAML playbooks?",o:["Puppet","Chef","SaltStack (default)","Ansible"],a:3,e:"<strong>Ansible</strong> is agentless — it pushes configurations over SSH without requiring any agent on managed devices. Playbooks are written in <strong>YAML</strong>. It uses a push model where the control node initiates operations."},
{d:"ORCH",q:"What is the primary advantage of agent-based tools like Puppet over agentless tools like Ansible?",o:["Simpler initial setup","No software required on endpoints","Continuous desired-state enforcement and real-time drift detection/remediation","Lower network bandwidth usage"],a:2,e:"Puppet agents periodically compare local state to the desired catalog and self-heal drifts automatically — <strong>continuous compliance</strong>. Ansible only enforces state when a playbook is explicitly run."},
{d:"ORCH",q:"In Ansible, what is the 'inventory' file?",o:["A YAML file defining playbook tasks","A list of managed hosts and groups with optional variables","A Jinja2 template for device configuration","A record of previous playbook runs"],a:1,e:"The Ansible <strong>inventory</strong> defines hosts and groups (e.g., [routers], [switches]) that playbooks target. It can be static (INI/YAML file) or dynamic (a script querying a CMDB or cloud API)."},
{d:"ORCH",q:"Which Ansible connection plugin is recommended for Cisco IOS/IOS-XE devices using the cisco.ios collection?",o:["paramiko","ssh","network_cli","httpapi"],a:2,e:"<strong>network_cli</strong> is the connection plugin for CLI-based network devices. It handles IOS prompt patterns, enable mode, and paging. httpapi is used for REST-based platforms like NX-OS with RESTCONF or APIC."},
{d:"ORCH",q:"What is idempotency in network orchestration?",o:["Encrypting playbook variables","Running the same playbook N times produces the same desired end state as running it once","Each playbook run creates a new config version","Orchestration tools require re-authentication on every run"],a:1,e:"An <strong>idempotent</strong> operation has the same effect regardless of how many times it is applied. Ansible checks current state before making changes — if the desired state already exists, no change is made. This prevents unintended duplication."},
{d:"ORCH",q:"What does Ansible's 'register' keyword do in a task?",o:["Registers the device in inventory","Saves the task's output (stdout, rc, changed) to a named variable for use in subsequent tasks","Creates a new user account on the device","Schedules a task for later execution"],a:1,e:"<strong>register: varname</strong> captures the task result into a variable. This variable can then be used in when conditions, debug tasks, or further processing. Essential for capturing show command output."},
{d:"ORCH",q:"Which characteristic distinguishes Ansible from Chef?",o:["Both are agentless","Ansible is agentless and push-based with YAML; Chef requires a chef-client agent and uses Ruby DSL","Ansible uses Ruby; Chef uses YAML","Chef is agentless; Ansible requires agents"],a:1,e:"<strong>Ansible</strong>: agentless, push-based, YAML playbooks. <strong>Chef</strong>: agent-based (chef-client), pull-based, Ruby DSL cookbooks. This is a key ENCOR exam distinction for the agent vs. agentless comparison."},
{d:"ORCH",q:"In configuration management, what is 'mutable infrastructure'?",o:["Infrastructure that changes over time through in-place updates to existing systems","Infrastructure that is replaced rather than modified when changes are needed","Infrastructure that cannot be changed","Infrastructure managed by Terraform"],a:0,e:"<strong>Mutable infrastructure</strong> is updated in place (Ansible, Chef, Puppet managing running systems). <strong>Immutable infrastructure</strong> replaces instances entirely when changes are needed (Terraform provisioning new VMs)."},
{d:"ORCH",q:"What is the primary use case of Terraform compared to Ansible?",o:["Terraform manages software packages; Ansible manages hardware","Terraform provisions infrastructure (create/modify/destroy resources with state tracking); Ansible configures existing systems","Both do exactly the same thing","Terraform requires agents; Ansible does not"],a:1,e:"<strong>Terraform</strong> focuses on infrastructure provisioning (IaC) with a state file tracking deployed resources. <strong>Ansible</strong> configures existing systems. They complement each other: Terraform provisions, Ansible configures."},
{d:"ORCH",q:"What does 'immutable infrastructure' mean in the context of orchestration?",o:["All infrastructure is encrypted","Instead of modifying existing systems, new infrastructure is provisioned with desired state and old systems are replaced","Infrastructure that cannot be automated","Infrastructure with immutable access controls"],a:1,e:"<strong>Immutable infrastructure</strong> (used by orchestration/Terraform): when a change is needed, new instances are provisioned and old ones destroyed. No in-place modifications. This ensures consistency and eliminates configuration drift."},
{d:"ORCH",q:"Which Ansible keyword triggers an action (like restarting a service) only when a preceding task reports a change?",o:["when","loop","register","notify / handlers"],a:3,e:"<strong>notify</strong> triggers a named <strong>handler</strong> when the task reports 'changed=true'. Handlers run once at the end of the play. Example: a config change task notifies a 'restart OSPF' handler."},
{d:"ORCH",q:"What is the primary scalability disadvantage of agentless tools for very large environments?",o:["They cannot handle multi-vendor environments","SSH connection overhead per task and lack of continuous state monitoring limit scale; agents scale better for large real-time compliance","They require more storage","They cannot execute configuration changes"],a:1,e:"Agentless tools open new <strong>SSH connections per task per device</strong>, which is slow at scale. They also lack persistent agents for real-time drift detection. Agent-based tools maintain persistent connections and enforce compliance continuously."},

// ════════════ SHUFFLE ════════════
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ════════════ STATE ════════════
let questions=[]; // shuffled order
let answered=0,correct=0,wrong=0;
let domainStats={}; // {domain:{ans:0,ok:0}}

// ════════════ DOMAIN CHIPS (header) ════════════
function buildDomainChips(){
  const c=document.getElementById('dchips');
  c.innerHTML='';
  Object.entries(DOMAINS).forEach(([k,v])=>{
    const s=document.createElement('span');
    s.className='dc';
    s.textContent=v.label;
    s.style.cssText=`background:${v.color}18;color:${v.color};border:1px solid ${v.color}40`;
    c.appendChild(s);
  });
}

// ════════════ FILTER BUTTONS ════════════
function buildFilterBtns(){
  const c=document.getElementById('filter-btns');
  c.innerHTML='';
  const all=document.createElement('button');
  all.className='btn-f active';all.textContent='ALL';all.onclick=()=>filterBy('all',all);
  c.appendChild(all);
  Object.entries(DOMAINS).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='btn-f';b.textContent=k;b.dataset.d=k;
    b.onclick=()=>filterBy(k,b);
    c.appendChild(b);
  });
}

function filterBy(key,btn){
  document.querySelectorAll('.btn-f').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach(c=>{
    c.classList.toggle('hidden', key!=='all' && c.dataset.d!==key);
  });
}

// ════════════ RENDER ════════════
const KEYS=['A','B','C','D'];
function renderQuiz(){
  const m=document.getElementById('qmain');
  m.innerHTML='';
  questions.forEach((q,idx)=>{
    const d=DOMAINS[q.d];
    const card=document.createElement('div');
    card.className='q-card';card.id='c'+idx;card.dataset.d=q.d;
    card.innerHTML=`
      <div class="q-head">
        <span class="q-num">Q${String(idx+1).padStart(3,'0')}</span>
        <span class="q-tag" style="background:${d.color}18;color:${d.color};border:1px solid ${d.color}40">${q.d}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="q-opts" id="o${idx}">
        ${q.o.map((opt,i)=>`
          <button class="opt" data-q="${idx}" data-i="${i}" onclick="answer(${idx},${i})">
            <span class="opt-k">${KEYS[i]}</span><span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="exp" id="e${idx}"><strong>// Explanation:</strong> ${q.e}<br><span class="ref">Domain: ${d.label}</span></div>`;
    m.appendChild(card);
  });
  // result panel
  const r=document.createElement('div');
  r.id='result';
  r.innerHTML=`
    <div class="r-pct" id="rpct">—</div>
    <div class="r-lbl">FINAL SCORE · 200 QUESTIONS</div>
    <div class="r-msg" id="rmsg"></div>
    <div class="r-detail" id="rdetail"></div>
    <div class="r-grid">
      <div class="r-cell"><div class="r-n" id="rb-ok" style="color:var(--ok)">0</div><div class="r-l">CORRECT</div></div>
      <div class="r-cell"><div class="r-n" id="rb-ko" style="color:var(--ko)">0</div><div class="r-l">WRONG</div></div>
      <div class="r-cell"><div class="r-n" id="rb-pct" style="color:var(--t1)">0%</div><div class="r-l">SCORE</div></div>
    </div>
    <div class="r-domain-breakdown" id="rdomains"></div>
    <button class="btn-retry" onclick="shuffleAndRestart()">// NEW SHUFFLE & RESTART</button>`;
  m.appendChild(r);
}

// ════════════ ANSWER ════════════
function answer(qIdx,optIdx){
  const q=questions[qIdx];
  const card=document.getElementById('c'+qIdx);
  const opts=document.querySelectorAll('#o'+qIdx+' .opt');
  const exp=document.getElementById('e'+qIdx);
  opts.forEach(b=>b.disabled=true);
  const ok=optIdx===q.a;
  opts[q.a].classList.add('oc');
  if(!ok) opts[optIdx].classList.add('ow');
  card.classList.add(ok?'ok':'ko');
  exp.classList.add('show');
  answered++;if(ok)correct++;else wrong++;
  // domain stats
  if(!domainStats[q.d]) domainStats[q.d]={ans:0,ok:0};
  domainStats[q.d].ans++;if(ok) domainStats[q.d].ok++;
  updateStats();
  if(answered===questions.length) setTimeout(showResult,600);
}

function updateStats(){
  document.getElementById('sv-a').textContent=answered;
  document.getElementById('sv-ok').textContent=correct;
  document.getElementById('sv-ko').textContent=wrong;
  document.getElementById('pb').style.width=(answered/questions.length*100)+'%';
}

// ════════════ RESULT ════════════
function showResult(){
  const pct=Math.round(correct/questions.length*100);
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rb-ok').textContent=correct;
  document.getElementById('rb-ko').textContent=wrong;
  document.getElementById('rb-pct').textContent=pct+'%';
  let msg,detail;
  if(pct>=85){msg='🏆 Exam Ready — CCNP ENCOR Level';detail=`${correct}/200 correct · Strong across all domains`;}
  else if(pct>=72){msg='📡 Above Cisco Passing Threshold (~72%)';detail=`${correct}/200 correct · Fine-tune weak areas before exam`;}
  else if(pct>=60){msg='🔧 Getting Closer';detail=`${correct}/200 correct · Focus on Security, L3, and Automation`;}
  else{msg='📚 More Study Required';detail=`${correct}/200 correct · Review CCNP Official Cert Guide chapters`;}
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('rdetail').textContent=detail;
  // domain breakdown
  const db=document.getElementById('rdomains');
  db.innerHTML='<div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:12px">// SCORE BY DOMAIN</div>';
  Object.entries(domainStats).forEach(([k,s])=>{
    const p=Math.round((s.ok/s.ans)*100);
    const d=DOMAINS[k];
    db.innerHTML+=`<div class="r-drow">
      <span class="r-dname">${k}</span>
      <div class="r-dbar-wrap"><div class="r-dbar" style="width:${p}%;background:${d.color}"></div></div>
      <span class="r-dpct">${p}%</span>
    </div>`;
  });
  r.scrollIntoView({behavior:'smooth'});
}

// ════════════ SHUFFLE & RESTART ════════════
function shuffleAndRestart(){
  answered=0;correct=0;wrong=0;domainStats={};
  questions=shuffle([...ALL]);
  updateStats();
  buildFilterBtns();
  renderQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ════════════ INIT ════════════
buildDomainChips();
shuffleAndRestart(); // initial render with shuffle
</script>
</body>
</html>
