<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Redes Informáticas</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif}
body{min-height:100vh;background:radial-gradient(circle at top left,#00e5ff33,transparent 35%),radial-gradient(circle at bottom right,#7c3aed44,transparent 35%),linear-gradient(135deg,#020617,#0f172a);color:white;padding:25px}
.app{max-width:1100px;margin:auto}
header{text-align:center;padding:35px 10px}
header h1{font-size:3rem;color:#38bdf8}
header p{color:#cbd5e1;margin-top:10px}
.panel{background:rgba(15,23,42,.9);border:1px solid #38bdf866;border-radius:24px;padding:25px;box-shadow:0 0 35px #38bdf833}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:20px}
.stat{background:#020617;border:1px solid #334155;border-radius:16px;padding:18px;text-align:center}
.stat strong{display:block;font-size:1.8rem;color:#22d3ee}
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
select,button{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}
select{background:#020617;color:white;border:1px solid #334155}
button{background:linear-gradient(135deg,#06b6d4,#3b82f6);color:white}
.secondary{background:#1e293b}
.card{background:linear-gradient(135deg,#111827,#020617);border:1px solid #334155;border-radius:22px;padding:28px}
.badge{display:inline-block;background:#0e7490;padding:7px 14px;border-radius:999px;margin-bottom:15px}
.question{font-size:1.45rem;margin-bottom:20px;line-height:1.4}
.options{display:grid;gap:12px}
.option{background:#0f172a;border:1px solid #334155;color:white;text-align:left;padding:16px;border-radius:14px}
.correct{background:#064e3b!important;border-color:#22c55e!important}
.wrong{background:#7f1d1d!important;border-color:#ef4444!important}
.feedback{margin-top:18px;font-weight:bold;font-size:1.1rem}
.footer{margin-top:25px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.progress{height:12px;background:#1e293b;border-radius:999px;overflow:hidden;margin:18px 0}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#22d3ee,#22c55e)}
@media(max-width:600px){body{padding:14px}header h1{font-size:2.2rem}.question{font-size:1.2rem}}
</style>
</head>

<body>
<div class="app">
<header>
<h1>Quiz Redes Informáticas</h1>
<p>100 preguntas de Routing, Switching, OSPF, BGP, Seguridad, QoS, Wireless y Automatización.</p>
</header>

<main class="panel">
<div class="stats">
<div class="stat"><strong id="visits">0</strong>Visitas locales</div>
<div class="stat"><strong id="total">100</strong>Preguntas</div>
<div class="stat"><strong id="score">0</strong>Correctas</div>
<div class="stat"><strong id="current">1</strong>Actual</div>
<div class="stat"><strong id="percent">0%</strong>Progreso</div>
</div>

<div class="controls">
<select id="categoryFilter">
<option value="todas">Todas</option>
<option value="Routing">Routing</option>
<option value="Switching">Switching</option>
<option value="OSPF">OSPF</option>
<option value="BGP">BGP</option>
<option value="Seguridad">Seguridad</option>
<option value="QoS">QoS</option>
<option value="Wireless">Wireless</option>
<option value="Automatización">Automatización</option>
</select>
<button onclick="restartQuiz()">Reiniciar</button>
<button onclick="shuffleQuiz()">Mezclar</button>
</div>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<section class="card">
<span class="badge" id="category"></span>
<h2 class="question" id="question"></h2>
<div class="options" id="options"></div>
<p class="feedback" id="feedback"></p>
<div class="footer">
<button class="secondary" onclick="previousQuestion()">Anterior</button>
<button onclick="nextQuestion()">Siguiente</button>
</div>
</section>
</main>
</div>

<script>
function contadorVisitas(){
let visitas=localStorage.getItem("visitas_ccnp");
visitas=visitas?parseInt(visitas)+1:1;
localStorage.setItem("visitas_ccnp",visitas);
document.getElementById("visits").textContent=visitas;
}
contadorVisitas();

const questions=[
["Routing","¿Qué distancia administrativa tiene OSPF por defecto?",["90","100","110","120"],2],

["OSPF","¿Qué estado indica adyacencia completa?",["Init","2-Way","Exchange","Full"],3],
["OSPF","¿Qué comando muestra vecinos OSPF?",["show ip ospf neighbor","show ip bgp","show vlan","show etherchannel"],0],

["Switching","¿Qué protocolo propietario Cisco negocia EtherChannel?",["LACP","PAgP","LLDP","SNMP"],1],

["Switching","¿Qué protocolo Cisco permite balanceo de gateway?",["GLBP","VRRP","RIP","MPLS"],0],
["Switching","¿Qué comando muestra estado de HSRP?",["show standby brief","show vlan brief","show ip bgp","show cdp"],0],
["Switching","¿Qué es una VLAN?",["Dominio lógico de broadcast","Ruta estática","Túnel VPN","ACL extendida"],0],
["Switching","¿Qué modo de puerto transporta varias VLANs?",["Access","Trunk","Routed","Loopback"],1],
["Switching","¿Qué VLAN se usa por defecto en switches Cisco?",["1","10","99","1002"],0],
["Switching","¿Qué tecnología agrupa enlaces físicos?",["EtherChannel","HSRP","NAT","ACL"],0],
["Switching","¿Qué comando verifica troncales?",["show interfaces trunk","show ip route","show bgp","show ntp"],0],

["QoS","¿Qué tráfico suele ser más sensible a jitter?",["Voz","Correo","Backups","Descargas"],0],
["QoS","¿Qué campo IPv4 se usa para clasificación moderna?",["DSCP","TTL","ID","Checksum"],0],
["QoS","¿Qué valor DSCP se asocia comúnmente a voz?",["EF","AF11","CS1","BE"],0],
["QoS","¿Qué significa policing?",["Limitar tráfico","Crear VLAN","Enrutar OSPF","Elegir DR"],0],
["QoS","¿Qué significa shaping?",["Suavizar tráfico","Eliminar rutas","Crear ACL","Asignar IP"],0],
["QoS","¿Qué cola se usa para tráfico de baja latencia?",["LLQ","FIFO","DNS","VTP"],0],

["Automatización","¿Qué método HTTP elimina recursos?",["GET","DELETE","POST","HEAD"],1],

["Automatización","¿Qué es RESTCONF?",["API basada en HTTP para redes","Protocolo de voz","Cifrado WiFi","Tipo de NAT"],0],
["Routing","¿Qué protocolo asigna direcciones IP automáticamente?",["DNS","DHCP","NTP","SMTP"],1],
["Routing","¿Qué protocolo resuelve nombres a IP?",["DNS","DHCP","FTP","SNMP"],0],
["Routing","¿Qué protocolo sincroniza hora?",["NTP","DNS","HTTP","ARP"],0],
["Routing","¿Qué protocolo descubre MAC a partir de IP en IPv4?",["ARP","DNS","BGP","SNMP"],0],
["Routing","¿Qué protocolo reemplaza ARP en IPv6?",["NDP","RIP","VTP","DTP"],0],
["Routing","¿Qué dirección IPv6 representa loopback?",["::1","fe80::1","2001::1","ff02::1"],0],
["Routing","¿Qué prefijo IPv6 suele ser link-local?",["fe80::/10","2000::/3","ff00::/8","::/0"],0],
["Routing","¿Qué ruta representa default IPv4?",["0.0.0.0/0","127.0.0.1","255.255.255.255","224.0.0.5"],0],
["Routing","¿Qué ruta representa default IPv6?",["::/0","::1/128","fe80::/10","ff00::/8"],0],

let filteredQuestions=[...questions];
let index=0;
let score=0;

const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");
const feedbackEl=document.getElementById("feedback");
const categoryEl=document.getElementById("category");
const scoreEl=document.getElementById("score");
const currentEl=document.getElementById("current");
const totalEl=document.getElementById("total");
const percentEl=document.getElementById("percent");
const progressBar=document.getElementById("progressBar");
const categoryFilter=document.getElementById("categoryFilter");

function renderQuestion(){
const item=filteredQuestions[index];

if(!item){
questionEl.textContent="No hay preguntas en esta categoría.";
optionsEl.innerHTML="";
categoryEl.textContent="Sin datos";
feedbackEl.textContent="";
updateStats();
return;
}

categoryEl.textContent=item.category;
questionEl.textContent=`${item.id}. ${item.question}`;
optionsEl.innerHTML="";
feedbackEl.textContent="";

item.options.forEach((option,optionIndex)=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=option;

if(item.answered){
if(optionIndex===item.answer)btn.classList.add("correct");
if(optionIndex===item.selected&&optionIndex!==item.answer)btn.classList.add("wrong");
}

btn.onclick=()=>selectAnswer(optionIndex);
optionsEl.appendChild(btn);
});

updateStats();
}

function selectAnswer(optionIndex){
const item=filteredQuestions[index];
if(item.answered)return;

item.answered=true;
item.selected=optionIndex;

if(optionIndex===item.answer){
score++;
feedbackEl.textContent="✔️ Correcto.";
feedbackEl.style.color="#22c55e";
}else{
feedbackEl.textContent=`❌ Incorrecto. Respuesta correcta: ${item.options[item.answer]}`;
feedbackEl.style.color="#ef4444";
}

renderQuestion();
}

function nextQuestion(){
if(index<filteredQuestions.length-1){
index++;
renderQuestion();
}
}

function previousQuestion(){
if(index>0){
index--;
renderQuestion();
}
}

function updateStats(){
const total=filteredQuestions.length;
const progress=total===0?0:Math.round(((index+1)/total)*100);
totalEl.textContent=total;
scoreEl.textContent=score;
currentEl.textContent=total===0?0:index+1;
percentEl.textContent=`${progress}%`;
progressBar.style.width=`${progress}%`;
}

function restartQuiz(){
questions.forEach(q=>{
q.answered=false;
q.selected=null;
});
score=0;
index=0;
applyFilter();
}

function shuffleQuiz(){
filteredQuestions.sort(()=>Math.random()-.5);
index=0;
renderQuestion();
}

function applyFilter(){
const category=categoryFilter.value;
filteredQuestions=category==="todas"?[...questions]:questions.filter(q=>q.category===category);
index=0;
score=filteredQuestions.filter(q=>q.answered&&q.selected===q.answer).length;
renderQuestion();
}

categoryFilter.addEventListener("change",applyFilter);
renderQuestion();
</script>
</body>
</html>
