<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNP ENCOR 350-401 · Full Practice · 200Q</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--surf:#0d0f12;--card:#111418;--border:#1c2028;--b2:#2a303c;
  --t1:#00e5ff;--t2:#39ff14;--t3:#ff6b1a;--t4:#c084fc;--t5:#f43f5e;--t6:#fbbf24;--t7:#34d399;--t8:#60a5fa;
  --ok:#39ff14;--ko:#f43f5e;--text:#b0bec5;--head:#eceff1;--muted:#4a5568;
  --mono:'IBM Plex Mono',monospace;--sans:'Barlow',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.018) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(0,229,255,.055) 0%,transparent 55%);
  pointer-events:none;z-index:0}

/* ── HEADER ── */
header{position:relative;z-index:10;text-align:center;padding:52px 24px 32px;border-bottom:1px solid var(--border)}
.chip{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;
  color:var(--t1);border:1px solid rgba(0,229,255,.35);padding:5px 16px;border-radius:2px;
  margin-bottom:18px;letter-spacing:3px;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}50%{box-shadow:0 0 20px 3px rgba(0,229,255,.2)}}
.chip::before{content:'▶';font-size:7px}
h1{font-family:var(--sans);font-weight:900;font-size:clamp(24px,5vw,52px);
  color:var(--head);line-height:1.05;letter-spacing:-1.5px}
h1 em{font-style:normal;background:linear-gradient(100deg,var(--t1),var(--t2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px}
.domain-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:18px}
.dc{font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:2px;letter-spacing:1.2px}

/* ── STICKY ── */
.sbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  padding:9px 24px;background:rgba(7,8,10,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.st{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px}
.st-l{color:var(--muted)}.st-v{font-weight:700}
#sv-a{color:var(--t1)}#sv-ok{color:var(--t2)}#sv-ko{color:var(--t5)}
.pw{flex:1;min-width:60px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
#pb{height:100%;width:0%;background:linear-gradient(90deg,var(--t1),var(--t2));border-radius:2px;transition:width .4s ease}
.btns{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.btn-f{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:2px;
  cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.btn-f:hover,.btn-f.active{border-color:var(--t1);color:var(--t1);background:rgba(0,229,255,.08)}
.btn-shuf{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:3px 10px;border-radius:2px;
  cursor:pointer;border:1px solid var(--t3);background:rgba(255,107,26,.08);color:var(--t3);transition:all .15s}
.btn-shuf:hover{background:var(--t3);color:var(--bg)}

/* ── MAIN ── */
main{position:relative;z-index:5;max-width:940px;margin:0 auto;padding:32px 20px 80px}

/* ── CARD ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:6px;
  margin-bottom:14px;overflow:hidden;animation:cin .3s ease both;transition:border-color .25s,box-shadow .25s}
@keyframes cin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-card:hover{border-color:var(--b2)}
.q-card.ok{border-color:rgba(57,255,20,.5);box-shadow:0 0 12px rgba(57,255,20,.06)}
.q-card.ko{border-color:rgba(244,63,94,.45);box-shadow:0 0 12px rgba(244,63,94,.06)}
.q-card.hidden{display:none}

.q-head{display:flex;align-items:flex-start;gap:10px;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.q-num{flex-shrink:0;font-family:var(--mono);font-size:9px;color:var(--muted);border:1px solid var(--border);padding:3px 7px;border-radius:2px;margin-top:2px}
.q-tag{flex-shrink:0;font-family:var(--mono);font-size:9px;letter-spacing:1.2px;padding:3px 8px;border-radius:2px;margin-top:1px;white-space:nowrap}
.q-text{font-size:14px;color:var(--head);font-weight:600;line-height:1.5}
.q-text code{font-family:var(--mono);font-size:12px;background:rgba(0,229,255,.08);color:var(--t1);padding:1px 5px;border-radius:3px}
.q-text pre{font-family:var(--mono);font-size:11.5px;background:rgba(0,0,0,.4);color:#a5f3fc;
  padding:10px 14px;border-radius:4px;margin-top:8px;border-left:2px solid var(--t1);
  overflow-x:auto;white-space:pre-wrap;line-height:1.5}

.q-opts{padding:10px 20px 14px;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--surf);
  border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .18s;
  text-align:left;font-family:var(--sans);font-size:13.5px;color:var(--text);width:100%}
.opt:hover:not(:disabled){border-color:var(--t1);background:rgba(0,229,255,.04);color:var(--head)}
.opt:disabled{cursor:default}
.opt-k{flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--muted);
  border:1px solid var(--border);padding:1px 6px;border-radius:2px;margin-top:1px}
.opt.oc{background:rgba(57,255,20,.07);border-color:var(--ok);color:var(--ok)}
.opt.oc .opt-k{color:var(--ok);border-color:var(--ok)}
.opt.ow{background:rgba(244,63,94,.07);border-color:var(--ko);color:var(--ko)}
.opt.ow .opt-k{color:var(--ko);border-color:var(--ko)}

.exp{display:none;margin:0 20px 14px;padding:11px 14px;
  background:rgba(0,229,255,.04);border-left:2px solid var(--t1);
  border-radius:0 4px 4px 0;font-family:var(--mono);font-size:11.5px;
  color:#607d8b;line-height:1.65;animation:fin .25s ease}
@keyframes fin{from{opacity:0}to{opacity:1}}
.exp.show{display:block}
.exp strong{color:var(--t2)}
.exp .ref{color:var(--t6);font-size:10px}

/* ── RESULT ── */
#result{display:none;text-align:center;padding:60px 32px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;margin-top:20px;animation:cin .5s ease}
#result.show{display:block}
.r-pct{font-size:clamp(80px,14vw,120px);font-weight:900;line-height:1;
  background:linear-gradient(130deg,var(--t1),var(--t2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.r-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:3px;margin-top:6px}
.r-msg{margin-top:22px;font-size:18px;font-weight:700;color:var(--head)}
.r-detail{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.r-grid{display:flex;justify-content:center;gap:40px;margin-top:28px;flex-wrap:wrap}
.r-cell{text-align:center}
.r-n{font-size:32px;font-weight:900}.r-l{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.r-domain-breakdown{margin-top:36px;text-align:left;max-width:500px;margin-left:auto;margin-right:auto}
.r-drow{display:flex;align-items:center;gap:12px;margin-top:10px;font-family:var(--mono);font-size:11px}
.r-dname{width:140px;color:var(--muted)}
.r-dbar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.r-dbar{height:100%;border-radius:3px;transition:width .8s ease}
.r-dpct{width:40px;text-align:right;color:var(--head)}
.btn-retry{margin-top:36px;display:inline-block;font-family:var(--mono);font-size:12px;
  letter-spacing:2px;padding:14px 36px;background:transparent;color:var(--t1);
  border:1px solid var(--t1);border-radius:3px;cursor:pointer;transition:all .2s}
.btn-retry:hover{background:var(--t1);color:var(--bg);box-shadow:0 0 24px rgba(0,229,255,.4)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:600px){
  .sbar{padding:8px 12px;gap:8px}
  .btns{display:none}
  .q-head{padding:12px 14px 10px}
  .q-opts{padding:8px 14px 12px}
  .exp{margin:0 14px 12px}
}
</style>
</head>
<body>
<header>
  <div class="chip">CCNP ENCOR 350-401 v1.2 · FULL EXAM SIMULATION</div>
  <h1>200 Practice Questions<br><em>All Domains · Randomized</em></h1>
  <p class="sub">// Architecture · Virtualization · Infrastructure · Assurance · Security · Automation · AI</p>
  <div class="domain-chips" id="dchips"></div>
</header>

<div class="sbar">
  <div class="st"><span class="st-l">ANS</span>&nbsp;<span class="st-v" id="sv-a">0</span><span class="st-l">/200</span></div>
  <div class="st"><span class="st-l">✓</span>&nbsp;<span class="st-v" id="sv-ok">0</span></div>
  <div class="st"><span class="st-l">✗</span>&nbsp;<span class="st-v" id="sv-ko">0</span></div>
  <div class="pw"><div id="pb"></div></div>
  <div class="btns" id="filter-btns"></div>
  <button class="btn-shuf" onclick="shuffleAndRestart()">⇌ SHUFFLE</button>
</div>

<main id="qmain"></main>

<script>
// ════════════ DOMAIN DEFINITIONS ════════════
const DOMAINS = {
  "ARCH":  {label:"1.0 Architecture",    color:"#00e5ff"},
  "VIRT":  {label:"2.0 Virtualization",  color:"#60a5fa"},
  "L2":    {label:"3.1 Layer 2",         color:"#39ff14"},
  "L3":    {label:"3.2 Layer 3",         color:"#34d399"},
  "IPSVS": {label:"3.3 IP Services",     color:"#fbbf24"},
  "ASSUR": {label:"4.0 Assurance",       color:"#c084fc"},
  "SEC":   {label:"5.0 Security",        color:"#f43f5e"},
  "PY":    {label:"6.1 Python",          color:"#00e5ff"},
  "JSON":  {label:"6.2 JSON",            color:"#39ff14"},
  "YANG":  {label:"6.3 YANG",            color:"#ff6b1a"},
  "API":   {label:"6.4 APIs",            color:"#c084fc"},
  "REST":  {label:"6.5 REST/RC",         color:"#f43f5e"},
  "EEM":   {label:"6.6 EEM",             color:"#fbbf24"},
  "ORCH":  {label:"6.7 Orchestration",   color:"#34d399"},
};

// ════════════ 200 QUESTIONS ════════════
const ALL = [

// ──────────────────────────────────────────────
// 1.0 ARCHITECTURE  (20 questions)
// ──────────────────────────────────────────────
{d:"ARCH",q:"In a 3-tier campus design, which layer provides default gateway redundancy and inter-VLAN routing for access layer switches?",o:["Core layer","Distribution layer","Access layer","Collapsed core"],a:1,e:"<strong>Distribution layer</strong> handles inter-VLAN routing, FHRP (HSRP/VRRP/GLBP), and aggregates access layer uplinks. Core handles high-speed backbone transport."},
{d:"ARCH",q:"Which SD-WAN component is responsible for distributing routing and policy information to vEdge/cEdge devices?",o:["vBond","vManage","vSmart","vEdge"],a:2,e:"<strong>vSmart</strong> is the policy controller that distributes OMP routes and centralized policies to all WAN edge devices via OMP (Overlay Management Protocol)."},
{d:"ARCH",q:"What is the primary advantage of a spine-leaf (fabric) data center design over a traditional 3-tier model?",o:["Fewer switches required","Consistent east-west latency with any-to-any connectivity","Lower cost per port","No need for spanning tree"],a:1,e:"Spine-leaf provides <strong>predictable, low latency east-west traffic</strong>. Every leaf connects to every spine, guaranteeing max 2 hops between any two servers."},
{d:"ARCH",q:"Which SD-Access component is analogous to the MAP Server/Resolver in a LISP deployment?",o:["Fabric border node","Fabric edge node","Control plane node","Intermediate node"],a:2,e:"The <strong>control plane node</strong> in SD-Access runs LISP and maintains the endpoint database (EID-to-RLOC mapping). It is the MAP Server and MAP Resolver for the fabric."},
{d:"ARCH",q:"In Cisco SD-Access, which node type connects the fabric to external Layer 3 networks or other SD-Access fabrics?",o:["Fabric edge node","Control plane node","Fabric border node","Intermediate node"],a:2,e:"<strong>Fabric border nodes</strong> connect the SD-Access fabric to external networks (internet, DC, WAN). They perform LISP map-cache lookups for external destinations."},
{d:"ARCH",q:"Which QoS mechanism is responsible for classifying and marking traffic as close to the source as possible?",o:["Policing","Queuing","Classification and Marking","Shaping"],a:2,e:"<strong>Classification and marking</strong> should happen at the ingress edge (access layer) to set DSCP or CoS values that subsequent devices honor without re-classifying."},
{d:"ARCH",q:"What does SSO (Stateful Switchover) ensure in a dual-supervisor chassis?",o:["Both supervisors actively forward traffic simultaneously","The standby supervisor maintains a synchronized state so failover is transparent to the network","The standby supervisor rebuilds all protocol states from scratch after failover","Spanning tree is disabled during failover"],a:1,e:"<strong>SSO</strong> keeps the standby RP synchronized in real-time. On failover, the standby takes over with minimal disruption — line cards continue forwarding, and NSF preserves routing adjacencies."},
{d:"ARCH",q:"Which FHRP allows a single virtual IP to be load-balanced across multiple active gateways using different virtual MACs?",o:["HSRP v2","VRRP","GLBP","IRDP"],a:2,e:"<strong>GLBP (Gateway Load Balancing Protocol)</strong> is Cisco-proprietary and allows multiple routers in a group to forward traffic simultaneously, each with a different virtual MAC but sharing a virtual IP."},
{d:"ARCH",q:"What is the role of the vBond orchestrator in Cisco SD-WAN?",o:["Distributes routing policies to WAN edges","Manages GUI and REST API access","Authenticates and orchestrates initial connectivity between vEdge/cEdge and other controllers","Terminates IPsec tunnels for branch traffic"],a:2,e:"<strong>vBond</strong> is the first point of contact for all SD-WAN components. It authenticates devices and facilitates NAT traversal so that vEdge/cEdge routers can discover vSmart and vManage."},
{d:"ARCH",q:"In a 2-tier (collapsed core) campus design, which layers are merged into a single device?",o:["Access and distribution","Distribution and core","Access and core","All three layers"],a:1,e:"A <strong>collapsed core</strong> merges the distribution and core layers into a single tier. This is suitable for smaller campuses where the traffic volume does not justify separate core switches."},
{d:"ARCH",q:"Which SD-Access plane is responsible for endpoint registration and mobility tracking?",o:["Data plane","Control plane","Management plane","Policy plane"],a:1,e:"The SD-Access <strong>control plane</strong> (LISP) handles endpoint registration, tracking, and EID-to-RLOC mappings. This is what allows seamless endpoint mobility within the fabric."},
{d:"ARCH",q:"DSCP value EF (Expedited Forwarding) is decimal value:",o:["46","48","34","40"],a:0,e:"<strong>EF = DSCP 46</strong> (binary 101110). It maps to IP Precedence 5 and is used for voice bearer traffic requiring low latency, low jitter, and low loss."},
{d:"ARCH",q:"Which QoS mechanism delays packets when they exceed a configured rate but does NOT drop them?",o:["Policing","Marking","Shaping","Classification"],a:2,e:"<strong>Traffic shaping</strong> buffers (queues) excess traffic to smooth the output rate. Policing drops or re-marks excess traffic immediately. Shaping causes delay but no drops."},
{d:"ARCH",q:"In Cisco SD-WAN, OMP (Overlay Management Protocol) runs between which components?",o:["vEdge and vBond","vSmart and vEdge/cEdge","vManage and vBond","vEdge devices only"],a:1,e:"<strong>OMP</strong> is a TCP-based protocol that runs between <strong>vSmart and vEdge/cEdge</strong> to exchange routes, service chains, and crypto key information across the overlay."},
{d:"ARCH",q:"What is the primary function of a High Availability (HA) NSF (Non-Stop Forwarding) implementation?",o:["Prevents STP topology changes during supervisor failover","Allows CEF forwarding to continue during routing protocol reconvergence after a switchover","Synchronizes MAC address tables between dual supervisors","Encrypts control plane traffic during failover"],a:1,e:"<strong>NSF</strong> allows line cards to continue forwarding packets using stale CEF entries while the routing protocol re-establishes adjacencies after an RP switchover. Works with SSO."},
{d:"ARCH",q:"Which SD-Access component handles wireless traffic in an over-the-top (OTT) deployment?",o:["Fabric border node","WLC acting as policy extended node","Control plane node","vBond"],a:1,e:"In an SD-Access OTT wireless deployment, the <strong>WLC acts as a policy extended node</strong>. APs are in Local mode and the WLC centrally switches traffic before it enters the fabric."},
{d:"ARCH",q:"What distinguishes a 'cloud-managed' network architecture from an 'on-premises' managed architecture?",o:["Cloud-managed requires no internet connectivity","Cloud-managed uses a vendor SaaS platform for management; on-premises uses local controllers","On-premises is always more expensive","Cloud-managed always has lower latency"],a:1,e:"Cloud-managed (e.g., Meraki) uses a <strong>vendor-hosted SaaS management plane</strong>. On-premises (e.g., Catalyst Center) hosts the management platform locally. Cloud offers faster deployment; on-premises offers more control."},
{d:"ARCH",q:"In QoS, what does the term 'trust boundary' define?",o:["The firewall perimeter of the network","The point at which the network trusts incoming DSCP/CoS markings from devices","The maximum bandwidth allowed per application","The encryption boundary between campus and WAN"],a:1,e:"The <strong>trust boundary</strong> is where the network begins to honor existing QoS markings. Traffic from unmanaged endpoints (PCs) is typically re-classified at the first network device."},
{d:"ARCH",q:"Which HSRP version added support for group numbers above 255 and IPv6?",o:["HSRP version 1","HSRP version 2","GLBP","VRRP v3"],a:1,e:"<strong>HSRP version 2</strong> expanded group numbers from 0-255 to 0-4095, changed multicast address to 224.0.0.102, and added IPv6 support. Group number is encoded in the last 2 hex digits of the virtual MAC."},
{d:"ARCH",q:"What type of routing does SD-Access use in the underlay network to provide reachability between fabric nodes?",o:["Static routing only","OSPF or IS-IS with LDP","IS-IS (automated by Catalyst Center) or manual OSPF","BGP with route reflectors"],a:2,e:"SD-Access underlay uses <strong>IS-IS (deployed automatically by Catalyst Center) or manually configured OSPF/BGP</strong>. The underlay provides IP reachability; the overlay (LISP + VXLAN) handles segmentation."},

// ──────────────────────────────────────────────
// 2.0 VIRTUALIZATION  (15 questions)
// ──────────────────────────────────────────────
{d:"VIRT",q:"What is the key difference between a Type 1 and Type 2 hypervisor?",o:["Type 1 supports more VMs","Type 1 runs directly on bare metal hardware; Type 2 runs as an application on a host OS","Type 2 is more secure","Type 1 requires a separate management OS"],a:1,e:"<strong>Type 1 (bare-metal)</strong>: VMware ESXi, Hyper-V, Citrix XenServer — runs directly on hardware. <strong>Type 2 (hosted)</strong>: VMware Workstation, VirtualBox, Parallels — runs as an app on a host OS."},
{d:"VIRT",q:"Which VXLAN component encapsulates and de-encapsulates Layer 2 frames into UDP packets for transport across the Layer 3 underlay?",o:["VNI","VTEP","VLAN","VMM"],a:1,e:"<strong>VTEP (VXLAN Tunnel Endpoint)</strong> performs the encapsulation (adding VXLAN/UDP/IP headers) and de-encapsulation. VTEPs can be hardware-based (switches) or software-based (vSwitch)."},
{d:"VIRT",q:"How many unique segments can VXLAN support, compared to traditional VLANs?",o:["4,096 (same as VLAN)","16 million (24-bit VNI)","65,535","1 million"],a:1,e:"VXLAN uses a <strong>24-bit VXLAN Network Identifier (VNI)</strong>, allowing up to 2^24 = ~16 million unique segments. Traditional 802.1Q VLANs are limited to 4,094 usable IDs."},
{d:"VIRT",q:"What is 'live migration' in a virtualization environment?",o:["Cloning a VM to another datastore","Moving a running VM from one physical host to another with no downtime","Backing up a VM snapshot","Converting a VM from one hypervisor format to another"],a:1,e:"<strong>Live migration</strong> (VMware vMotion, Hyper-V Live Migration) moves a running VM between hosts without interruption. Memory state, disk, and network are transferred while the VM keeps running."},
{d:"VIRT",q:"In VXLAN, what identifier maintains Layer 2 isolation between different tenant segments?",o:["VLAN ID","VTEP IP address","VXLAN Network Identifier (VNI)","UDP port number"],a:2,e:"The <strong>VNI (VXLAN Network Identifier)</strong> in the VXLAN header identifies the tenant segment. Each VNI represents a distinct Layer 2 broadcast domain, providing multi-tenancy isolation."},
{d:"VIRT",q:"Which element in a virtualized environment provides network connectivity between VMs running on the same physical host?",o:["pNIC (physical NIC)","Hypervisor kernel","vSwitch (virtual switch)","VTEP"],a:2,e:"A <strong>vSwitch</strong> operates at Layer 2 within the hypervisor and connects VMs to each other and to external networks. Examples: VMware vSphere Standard Switch (VSS) and Distributed Switch (VDS)."},
{d:"VIRT",q:"A network engineer resolves a long-standing CPU resource contention issue between two VMs on the same ESXi host. What is the recommended approach?",o:["Restart both VMs","Adjust CPU resource reservations and shares","Add more vCPUs to each VM","Migrate both VMs to different hosts"],a:1,e:"<strong>Resource reservations, limits, and shares</strong> control how the hypervisor schedules CPU time between VMs. Reservations guarantee minimum CPU; shares determine priority when resources are contested."},
{d:"VIRT",q:"What does para-virtualization require from a guest OS?",o:["No modification to the guest OS","The guest OS is aware of the hypervisor and makes hypercalls instead of hardware calls","The guest OS must run on Type 2 hypervisors only","The guest OS handles all hardware interrupts natively"],a:1,e:"<strong>Para-virtualization</strong> (e.g., Xen with PV guests) requires a <strong>modified guest OS</strong> that calls the hypervisor API (hypercalls) directly, providing better performance than full virtualization."},
{d:"VIRT",q:"In GRE tunneling, what overhead (in bytes) does the GRE header add to each packet?",o:["4 bytes","24 bytes","8 bytes","20 bytes"],a:1,e:"A basic GRE tunnel adds <strong>24 bytes</strong> of overhead: 20 bytes for the outer IP header + 4 bytes for the GRE header. This reduces the effective MTU and may cause fragmentation."},
{d:"VIRT",q:"What is the primary purpose of VRF (Virtual Routing and Forwarding)?",o:["Encrypt traffic between remote sites","Create multiple independent routing tables on a single device, allowing IP address overlap","Provide redundant default gateways","Virtualize the physical switch ports"],a:1,e:"<strong>VRF</strong> creates separate routing table instances on a single device. Multiple VRFs can use overlapping IP address spaces without conflict — essential for MPLS L3VPN and network segmentation."},
{d:"VIRT",q:"Which Cisco technology allows multiple physical switches to appear as a single logical switch with a shared control plane?",o:["VSS (Virtual Switching System)","VPC (Virtual Port Channel)","StackWise","vPC+"],a:0,e:"<strong>VSS</strong> pairs two Catalyst switches into a single logical switch. Both chassis share one control plane, one management IP, and one spanning-tree instance. This eliminates the need for HSRP and STP blocking."},
{d:"VIRT",q:"When an interface is removed from a VRF and re-added, what must be done to its IP configuration?",o:["Nothing — IP address is preserved","The IP address must be re-entered because it is removed when the interface is assigned/removed from a VRF","The routing protocol must be restarted","The VRF must be deleted and recreated"],a:1,e:"IOS requires you to <strong>re-enter the IP address</strong> after assigning an interface to a VRF or removing it. The IP is cleared when VRF membership changes."},
{d:"VIRT",q:"Which technology is used as the data plane for Cisco SD-Access to encapsulate endpoint traffic across the fabric?",o:["GRE","IPsec","VXLAN","MPLS"],a:2,e:"SD-Access uses <strong>VXLAN</strong> for the data plane. VNIs provide macro and micro-segmentation. LISP is the control plane (mapping system). VTEPs are typically the fabric edge nodes."},
{d:"VIRT",q:"What is the maximum number of active ports that Cisco StackWise can support in a single stack?",o:["2","8","9","16"],a:2,e:"Cisco StackWise supports up to <strong>9 switches</strong> in a single stack (StackWise-480). The switches use a proprietary ring topology with a shared backplane up to 480 Gbps."},
{d:"VIRT",q:"In a VXLAN fabric with a BGP EVPN control plane, what replaces the need for multicast groups for BUM (Broadcast, Unknown unicast, Multicast) traffic handling?",o:["Static head-end replication","OSPF flooding","BGP EVPN Type 3 routes (Inclusive Multicast Ethernet Tag)","STP flooding"],a:2,e:"BGP EVPN <strong>Type 3 (IMET) routes</strong> allow VTEPs to discover each other and signal BUM traffic handling, enabling ingress replication (unicast) without multicast in the underlay."},

// 3.1 LAYER 2  (20 questions)
// ──────────────────────────────────────────────
{d:"L2",q:"SW1 has two interfaces with 'channel-group 1 mode active' and SW2 has 'channel-group 1 mode passive'. What will be the EtherChannel state?",o:["Down — both must be active","Up — LACP will negotiate successfully","Down — mismatched protocols","Up — PAgP negotiation takes over"],a:1,e:"LACP requires at least one side to be <strong>active</strong>. Active-passive is a valid combination. Active initiates negotiation; passive responds. Active-active also works."},
{d:"L2",q:"A switch has 'spanning-tree portfast bpduguard default' configured globally. What happens when a BPDU arrives on a PortFast-enabled access port?",o:["The BPDU is discarded silently","The port is placed into err-disabled state","The port reverts to standard STP mode","The switch becomes the root bridge"],a:1,e:"<strong>BPDU Guard</strong> err-disables the port immediately when a BPDU is received. This protects against rogue switches being connected to access ports."},
{d:"L2",q:"Which Rapid PVST+ port state immediately forwards traffic without transitioning through learning?",o:["Discarding","Learning","Forwarding","Blocking"],a:2,e:"With <strong>PortFast</strong>, the port transitions immediately to <strong>forwarding</strong>. Normally RSTP converges in ~1-2 seconds, but PortFast bypasses that for end-device ports."},
{d:"L2",q:"In MST (Multiple Spanning Tree), what is an 'instance'?",o:["A physical switch in the MST region","A logical grouping of VLANs that shares a single spanning-tree topology","A backup path for RSTP","An MSTP BPDU format"],a:1,e:"An MST <strong>instance</strong> maps one or more VLANs to a single spanning-tree computation. Instance 0 is the Internal Spanning Tree (IST) that connects to the CIST. Other instances are MSTIs."},
{d:"L2",q:"Which command configures an interface for 802.1Q trunking on a Cisco IOS switch?",o:["switchport mode access vlan 10","switchport trunk encapsulation dot1q\nswitchport mode trunk","switchport mode trunk only","switchport dynamic desirable"],a:1,e:"For IOS-based switches with multiple encapsulation support, you first set <strong>switchport trunk encapsulation dot1q</strong> then <strong>switchport mode trunk</strong>. Catalyst switches may not require the encapsulation command."},
{d:"L2",q:"What is the native VLAN on an 802.1Q trunk, and why is it significant from a security perspective?",o:["VLAN 1 by default; untagged frames traverse it, which could allow VLAN hopping","VLAN 100 by default; it carries management traffic","VLAN 4094; it is always encrypted","There is no native VLAN — all frames are tagged"],a:0,e:"<strong>Native VLAN</strong> (VLAN 1 by default) carries untagged frames. If mismatched on both ends, VLAN hopping attacks become possible. Best practice: change native VLAN to an unused VLAN and tag all traffic."},
{d:"L2",q:"Two switches have PAgP configured. SW1 has 'desirable' and SW2 has 'auto'. What is the EtherChannel result?",o:["Down — PAgP requires both active","Up — desirable initiates, auto responds","Down — protocol mismatch","Up but only one link active"],a:1,e:"PAgP <strong>desirable</strong> actively initiates negotiation; <strong>auto</strong> responds but doesn't initiate. Desirable-auto or desirable-desirable are valid PAgP combinations."},
{d:"L2",q:"Which STP enhancement prevents a non-designated port from becoming a designated port due to superior BPDUs being lost?",o:["PortFast","BPDU Guard","Root Guard","Loop Guard"],a:3,e:"<strong>Loop Guard</strong> prevents a port from transitioning from blocking/non-designated to forwarding if it stops receiving BPDUs (which could be due to a unidirectional link failure)."},
{d:"L2",q:"What does the 'show etherchannel summary' flag 'S' indicate for a port-channel interface?",o:["Suspended","Layer 2 port-channel","Standalone","Standby"],a:1,e:"Flag <strong>S = Layer 2</strong> port-channel. Flag R = Layer 3. Flag D = down. Flag P = bundled in port-channel. Knowing flags is essential for troubleshooting EtherChannel."},
{d:"L2",q:"In RSTP, which port role is elected on each LAN segment to forward traffic toward the root bridge?",o:["Root port","Designated port","Alternate port","Backup port"],a:1,e:"The <strong>designated port</strong> is the port on each segment closest to the root bridge (best path back to root). It forwards traffic on that segment. Each segment has one designated port."},
{d:"L2",q:"What is the purpose of BPDU Filter on a PortFast-enabled port?",o:["Drops all BPDUs on the port silently (stops sending and receiving)","Err-disables the port on BPDU receipt","Forwards BPDUs to the CPU for logging","Increases the BPDU timer"],a:0,e:"<strong>BPDU Filter</strong> suppresses BPDU sending and receiving on a port. Unlike BPDU Guard (which err-disables), BPDU Filter silently drops them. Use with caution — it can create loops if misapplied."},
{d:"L2",q:"LACP uses which multicast MAC address for PDU exchange?",o:["01:80:C2:00:00:00","01:00:0C:CC:CC:CC","01:80:C2:00:00:02","FF:FF:FF:FF:FF:FF"],a:2,e:"LACP PDUs are sent to destination MAC <strong>01:80:C2:00:00:02</strong>. PAgP uses 01:00:0C:CC:CC:CC. CDP uses 01:00:0C:CC:CC:CC as well. These are slow-path multicasts."},
{d:"L2",q:"What is the max number of active links in a standard LACP EtherChannel bundle?",o:["4","8","16","2"],a:1,e:"LACP supports up to <strong>16 member links</strong> per bundle — 8 active and 8 in hot-standby. The active 8 carry traffic; standby links take over if an active link fails."},
{d:"L2",q:"Which MST command on a Cisco switch maps VLAN 10 and 20 to MST instance 1?",o:["spanning-tree mst 1 vlan 10,20","spanning-tree mst configuration\n instance 1 vlan 10,20","spanning-tree vlan 10,20 instance 1","mst instance 1 add vlan 10,20"],a:1,e:"MST mapping is done inside the MST configuration submode: <strong>spanning-tree mst configuration</strong> then <strong>instance 1 vlan 10,20</strong>. Changes require 'exit' to apply."},
{d:"L2",q:"What happens when 'switchport nonegotiate' is configured on a trunk port?",o:["The port becomes an access port","DTP (Dynamic Trunking Protocol) frames are no longer sent on that interface","The port negotiates speed and duplex differently","LACP negotiation is disabled"],a:1,e:"<strong>switchport nonegotiate</strong> disables DTP, preventing trunk negotiation frames from being sent. Use this with manually configured trunks (switchport mode trunk) for security."},
{d:"L2",q:"A port shows 'S D' flags in 'show etherchannel summary'. What does this indicate?",o:["Suspended and Down — the bundle is down","Layer 2 port-channel that is down","Standby and Disabled","Suspended and Desirable"],a:1,e:"Flag <strong>S = Layer 2</strong>, Flag <strong>D = down</strong>. So 'S D' means the Layer 2 port-channel is currently down (not operational). This indicates a configuration mismatch or link failure."},
{d:"L2",q:"Which spanning-tree feature allows rapid transition to forwarding on point-to-point links in RSTP without waiting for timers?",o:["PortFast","Proposal/Agreement mechanism","Root Guard","Backbone Fast"],a:1,e:"RSTP's <strong>Proposal/Agreement (PA) handshake</strong> allows a port to transition rapidly to forwarding on point-to-point full-duplex links. This is why RSTP typically converges in under 1 second."},
{d:"L2",q:"What is a VLAN allowed list on a trunk, and what is its security benefit?",o:["A list of VLANs that are blocked on the trunk","A list of VLANs explicitly permitted to traverse the trunk, reducing the attack surface","A spanning-tree priority list","A QoS marking list for VLAN traffic"],a:1,e:"<strong>switchport trunk allowed vlan</strong> restricts which VLANs can cross the trunk. Limiting to only needed VLANs reduces broadcast domains, prevents VLAN hopping, and reduces unnecessary STP topology scope."},
{d:"L2",q:"Which EtherChannel load-balancing method is most appropriate when multiple flows go between the same source/destination IP pair?",o:["src-ip","dst-ip","src-dst-ip","src-mac"],a:2,e:"<strong>src-dst-ip</strong> hashes both source and destination IPs, providing the best distribution for various flows including those with the same source or destination."},
{d:"L2",q:"In RSTP, what role does a port take if it is NOT the root port and NOT the designated port?",o:["Backup port","Alternate port","Discarding port","Non-forwarding port"],a:1,e:"An <strong>alternate port</strong> provides an alternate path to the root bridge (different from the root port's path). It is in discarding state. A backup port is an alternate path on the same shared segment."},

// ──────────────────────────────────────────────
// 3.2 LAYER 3  (20 questions)
// ──────────────────────────────────────────────
{d:"L3",q:"In BGP, which attribute is used to influence inbound traffic from external neighbors by making the AS path appear longer?",o:["Local Preference","MED","AS Path Prepending","Weight"],a:2,e:"<strong>AS Path Prepending</strong> adds repeated ASNs to the AS_PATH attribute, making the path appear longer. External BGP neighbors prefer shorter paths, directing inbound traffic through a different link."},
{d:"L3",q:"What is the administrative distance of EIGRP internal routes?",o:["90","110","100","120"],a:0,e:"EIGRP internal = <strong>90</strong>. OSPF = 110. EIGRP external = 170. RIP = 120. Static = 1. Connected = 0. These values determine which source is preferred when routes to the same prefix exist."},
{d:"L3",q:"In OSPF, which network type does NOT elect a DR/BDR?",o:["Broadcast","Non-broadcast","Point-to-point","Point-to-multipoint"],a:2,e:"<strong>Point-to-point</strong> networks (serial, GRE tunnels by default) do NOT elect a DR/BDR. Only broadcast and non-broadcast (NBMA) network types elect DR/BDR."},
{d:"L3",q:"What is the default BGP local preference value, and which direction does it influence?",o:["100; influences outbound path selection within the AS","200; influences inbound traffic from external ASes","100; influences inbound traffic from external ASes","50; influences both inbound and outbound"],a:0,e:"BGP default <strong>Local Preference = 100</strong>. Higher is preferred. It is a well-known discretionary attribute exchanged only between iBGP peers, used to select the <strong>exit point from the AS</strong> (outbound)."},
{d:"L3",q:"In OSPF, which LSA type is generated by an ASBR to describe routes from external routing domains?",o:["Type 1 (Router LSA)","Type 2 (Network LSA)","Type 5 (AS External LSA)","Type 3 (Summary LSA)"],a:2,e:"<strong>Type 5 LSA (AS External LSA)</strong> is generated by the ASBR and flooded throughout the OSPF domain (except stub areas). Type 7 is used in NSSAs and converted to Type 5 at the ABR."},
{d:"L3",q:"An OSPF neighbor is stuck in EXSTART/EXCHANGE state. What is the most likely cause?",o:["Mismatched area IDs","MTU mismatch between neighbors","Different hello intervals","Mismatched authentication passwords"],a:1,e:"EXSTART/EXCHANGE issues are commonly caused by <strong>MTU mismatch</strong>. OSPF checks MTU in DBD packets. Use 'ip ospf mtu-ignore' to override, or fix the MTU. Hello timers affect 2-way state."},
{d:"L3",q:"Which BGP attribute is Cisco-proprietary and has the highest influence in best path selection?",o:["Local Preference","MED","Weight","Origin"],a:2,e:"<strong>Weight</strong> is Cisco-proprietary (not exchanged between peers) and is the first tiebreaker in BGP best path selection. Higher weight = preferred. Default is 0 for learned routes, 32768 for locally originated."},
{d:"L3",q:"What does 'passive-interface' do in an OSPF configuration?",o:["Completely disables OSPF on the interface","Suppresses hello packets on the interface but still advertises the network","Removes the interface from the routing process","Sets the interface to non-broadcast mode"],a:1,e:"<strong>passive-interface</strong> prevents OSPF hello packets from being sent/received on that interface (no neighbor formation) but the interface's network is still included in LSAs and routing updates."},
{d:"L3",q:"In EIGRP, what is the Feasibility Condition (FC) used to determine a Feasible Successor?",o:["The reported distance must be less than the feasible distance of the current successor","The interface bandwidth must be greater than the successor path","The hop count must be equal to the successor","The route metric must exactly match the successor"],a:0,e:"EIGRP <strong>Feasibility Condition</strong>: a route is a Feasible Successor if its Reported Distance (RD) is strictly less than the Feasible Distance (FD) of the current successor. This guarantees loop freedom."},
{d:"L3",q:"BGP sends KEEPALIVE messages every ___ seconds by default, with a hold time of ___ seconds.",o:["30 and 90","60 and 180","10 and 30","30 and 120"],a:1,e:"BGP default: <strong>KEEPALIVE = 60 seconds, Hold time = 180 seconds</strong>. If 3 keepalives are missed (180s), the session drops. These can be tuned with 'neighbor X timers'."},
{d:"L3",q:"Which OSPF area type allows external LSAs (Type 5) but blocks Type 3 summary LSAs from the backbone?",o:["Stub area","NSSA","Totally stubby area","Backbone area"],a:2,e:"A <strong>Totally Stubby Area</strong> blocks both Type 3 (inter-area summary) and Type 5 (external) LSAs. Only a default route (Type 3) is injected. Regular stub blocks Type 5 but allows Type 3."},
{d:"L3",q:"What is Policy-Based Routing (PBR), and how does it differ from standard routing?",o:["PBR uses dynamic routing protocols; standard routing uses static routes","PBR routes packets based on match criteria (ACL, packet size, ToS) rather than solely destination IP","PBR is used only for multicast routing","PBR replaces the routing table entirely"],a:1,e:"<strong>PBR</strong> matches traffic using route-maps and can forward packets based on source IP, DSCP, packet size, etc. — bypassing the normal destination-based routing table lookup."},
{d:"L3",q:"In eBGP, which BGP neighbor command is required when peers are not directly connected?",o:["neighbor X update-source loopback0","neighbor X ebgp-multihop <ttl>","neighbor X remote-as X","neighbor X next-hop-self"],a:1,e:"<strong>ebgp-multihop</strong> increases the IP TTL for eBGP packets to allow sessions through multiple hops. Without it, eBGP packets with default TTL=1 would be discarded after the first hop."},
{d:"L3",q:"What is the purpose of the 'ip ospf network point-to-point' command on a GigabitEthernet interface?",o:["Disables OSPF on the interface","Prevents DR/BDR election on a LAN segment; the two routers form full adjacency immediately","Changes the OSPF cost to 1","Enables OSPF only for multicast traffic"],a:1,e:"Setting <strong>point-to-point</strong> on a LAN interface prevents DR/BDR election and speeds convergence. Useful for point-to-point links configured on Ethernet where DR/BDR is unnecessary."},
{d:"L3",q:"Which command clears BGP soft inbound policies without dropping the BGP session?",o:["clear ip bgp * hard","clear ip bgp X.X.X.X soft in","debug ip bgp X.X.X.X updates","reset ip bgp X.X.X.X"],a:1,e:"<strong>clear ip bgp X soft in</strong> triggers a route refresh request, re-processing inbound updates without resetting the BGP session. Requires the ROUTE-REFRESH capability (RFC 2918)."},
{d:"L3",q:"In EIGRP, what happens to a route when there is no feasible successor and the successor is lost?",o:["The route is immediately removed from the routing table","The router sends an EIGRP query to all neighbors to find an alternate path (Active state)","The route falls back to OSPF","The interface is shut down"],a:1,e:"When a successor is lost and no Feasible Successor exists, the route enters <strong>Active state</strong>. EIGRP sends Query packets to all neighbors. If no reply within the Active Timer (3 min default), SIA (Stuck in Active) occurs."},
{d:"L3",q:"What is the OSPF default reference bandwidth, and why should it be changed in modern networks?",o:["100 Mbps; FastEthernet and higher all get cost 1, making path selection indistinguishable","1 Gbps; outdated for 10G networks","10 Mbps; all interfaces get the same cost","1 Tbps; too high for accurate cost calculation"],a:0,e:"OSPF default reference bandwidth = <strong>100 Mbps</strong>. Any interface ≥ 100 Mbps gets cost 1 (FastEthernet, GigE, 10GigE all equal). Change with 'auto-cost reference-bandwidth 10000' (for 10G)."},
{d:"L3",q:"Which BGP state comes immediately before ESTABLISHED and indicates that the routers are exchanging routing information?",o:["IDLE","CONNECT","OPENSENT","OPENCONFIRM"],a:3,e:"BGP state machine: IDLE → CONNECT → ACTIVE → OPENSENT → <strong>OPENCONFIRM</strong> → ESTABLISHED. OPENCONFIRM means the local router received an OPEN message and sent a KEEPALIVE, waiting for confirmation."},
{d:"L3",q:"What is the function of BGP NEXT_HOP attribute in iBGP?",o:["Set to the iBGP peer's address automatically","NOT changed by default; the eBGP next-hop is preserved in iBGP updates, requiring 'next-hop-self' if peers cannot reach the external next-hop","Changed to the local router's loopback address","Replaced by the router ID in iBGP"],a:1,e:"In iBGP, the NEXT_HOP is <strong>not changed by default</strong>. The eBGP next-hop address is preserved and advertised to iBGP peers. If iBGP peers can't reach that address, <strong>neighbor next-hop-self</strong> is used to change it to the local iBGP peering address."},
{d:"L3",q:"Idle (Admin) BGP state on a neighbor means:",o:["The neighbor is unreachable","An administrator used 'neighbor X shutdown' command","BGP is still initializing","The neighbor's AS number is wrong"],a:1,e:"<strong>Idle (Admin)</strong> means the session was manually administratively shut down with <strong>neighbor X shutdown</strong>. Use 'no neighbor X shutdown' to re-enable. Regular Idle means BGP is retrying after a failure."},

// ──────────────────────────────────────────────
// 3.3 IP SERVICES  (15 questions)
// ──────────────────────────────────────────────
{d:"IPSVS",q:"In IP SLA with ICMP echo, what does 'threshold 500' configure?",o:["Maximum allowed RTT in milliseconds","Number of retries before declaring failure","Minimum required bandwidth","DSCP marking threshold"],a:0,e:"IP SLA <strong>threshold</strong> defines the RTT value (in ms) that triggers a violation condition. When RTT exceeds the threshold, a threshold violation is declared, which can be tracked."},
{d:"IPSVS",q:"What is the function of PTP (Precision Time Protocol) compared to NTP?",o:["PTP is less accurate than NTP","PTP provides sub-microsecond synchronization using hardware timestamps; NTP provides millisecond accuracy","PTP only works over UDP","PTP replaces BGP for timing"],a:1,e:"<strong>PTP (IEEE 1588)</strong> achieves sub-microsecond timing using hardware-based timestamps and is required for applications like LTE/5G synchronization. NTP typically achieves 1-50ms accuracy."},
{d:"IPSVS",q:"Which NAT configuration allows multiple inside hosts to share a single outside IP address using port translation?",o:["Static NAT","Dynamic NAT","NAT overload (PAT)","Policy NAT"],a:2,e:"<strong>NAT overload (PAT — Port Address Translation)</strong> maps many inside addresses to one outside IP using unique source port numbers. This is how most home/enterprise internet access works."},
{d:"IPSVS",q:"What is the NTP stratum level of a device that is directly synchronized to an atomic clock (stratum 0 source)?",o:["Stratum 0","Stratum 1","Stratum 2","Stratum 15"],a:1,e:"An NTP server directly connected to a stratum 0 source (GPS, atomic clock) is <strong>Stratum 1</strong>. Downstream clients become stratum 2, and so on. Stratum 15 is the maximum; stratum 16 = unsynchronized."},
{d:"IPSVS",q:"An engineer configures 'ip nat inside source static tcp 10.1.1.100 80 209.165.200.1 80 extendable'. When is the 'extendable' keyword required?",o:["When the translation involves UDP","When multiple static translations exist for the same inside local address","When using PAT","When the inside interface is a loopback"],a:1,e:"<strong>extendable</strong> allows multiple static translations with the same inside local IP (e.g., same server exposed on multiple outside IPs). Without it, IOS only allows one static translation per inside address."},
{d:"IPSVS",q:"VRRP preemption is enabled by default. What does VRRP preemption do?",o:["Allows a router with higher priority to take over as master even if the current master is functional","Forces a VRRP group to always use the highest IP address as master","Disables VRRP if the tracked interface goes down","Synchronizes VRRP state between two devices"],a:0,e:"<strong>VRRP preemption</strong> (default enabled) allows a router with a higher priority to reclaim the Master role when it comes back online, even if the current Master is functional. In HSRP, preempt must be explicitly configured."},
{d:"IPSVS",q:"What is the default HSRP hello timer and hold timer?",o:["1 and 3 seconds","3 and 10 seconds","5 and 15 seconds","2 and 6 seconds"],a:1,e:"HSRP default: <strong>Hello = 3 seconds, Hold = 10 seconds</strong>. If the standby router does not receive 3 hellos within 10 seconds, it assumes the active router has failed."},
{d:"IPSVS",q:"Which multicast protocol is responsible for routers learning about group membership from directly connected hosts?",o:["PIM","IGMP","MSDP","OSPF Multicast"],a:1,e:"<strong>IGMP (Internet Group Management Protocol)</strong> is used between hosts and their directly connected multicast routers to signal group memberships. IGMPv2 adds leave messages; IGMPv3 adds source-specific multicast (SSM)."},
{d:"IPSVS",q:"In PIM Sparse Mode, what is the role of the Rendezvous Point (RP)?",o:["Blocks multicast traffic from non-members","Acts as a meeting point for multicast sources and receivers to establish multicast distribution trees","Assigns multicast group addresses","Converts IGMPv2 to IGMPv3 messages"],a:1,e:"The <strong>RP</strong> is the root of the shared distribution tree in PIM-SM. Sources register with the RP; receivers send joins toward the RP. The RP is required to bootstrap multicast group communication."},
{d:"IPSVS",q:"Which command verifies the current NAT translations on a Cisco router?",o:["show ip nat statistics","show ip nat translations","show ip route nat","debug ip nat brief"],a:1,e:"<strong>show ip nat translations</strong> displays the current active NAT table entries (inside local, inside global, outside local, outside global). 'show ip nat statistics' shows counters and pool info."},
{d:"IPSVS",q:"What HSRP feature reduces failover time when a tracked interface goes down?",o:["standby preempt","standby track <object> decrement <value>","standby timers msec","standby priority"],a:1,e:"<strong>standby track</strong> decrements the HSRP priority when a tracked interface or object fails. If the priority drops below the standby router's priority (and preempt is configured), failover occurs immediately."},
{d:"IPSVS",q:"In GLBP, what is the role of the AVF (Active Virtual Forwarder)?",o:["Elects the AVG","Responds to ARP requests with its own virtual MAC","Monitors all group members","Manages the virtual IP address"],a:1,e:"GLBP AVFs respond to ARP requests with their own unique <strong>virtual MAC address</strong>, distributing traffic across multiple gateways. The AVG (Active Virtual Gateway) manages MAC-to-router assignments."},
{d:"IPSVS",q:"Which SNMP version provides both authentication and encryption for management traffic?",o:["SNMPv1","SNMPv2c","SNMPv3 with noAuthNoPriv","SNMPv3 with authPriv"],a:3,e:"<strong>SNMPv3 with authPriv</strong> provides MD5/SHA authentication AND DES/AES encryption. authNoPriv authenticates but doesn't encrypt. noAuthNoPriv provides no security (like v1/v2c community strings)."},
{d:"IPSVS",q:"What is RPF (Reverse Path Forwarding) in multicast routing?",o:["A method to encrypt multicast streams","A loop prevention mechanism that checks whether the multicast packet arrived on the interface toward the source","A protocol for electing the RP","A filter that blocks multicast from unauthorized sources"],a:1,e:"<strong>RPF check</strong>: a multicast packet is only forwarded if it arrives on the interface that the router would use to reach the source (unicast routing table). If RPF fails, the packet is dropped to prevent loops."},
{d:"IPSVS",q:"Which Flexible NetFlow parameter exports flow records when a flow has been idle for a specified time?",o:["cache timeout active","cache timeout inactive","cache entries","cache type normal"],a:1,e:"<strong>cache timeout inactive</strong> triggers export of a flow record when no new packets for that flow have been seen for the specified time (e.g., 'cache timeout inactive 20' exports after 20 seconds of idle)."},

// ──────────────────────────────────────────────
// 4.0 NETWORK ASSURANCE  (15 questions)
// ──────────────────────────────────────────────
{d:"ASSUR",q:"In SPAN (Switched Port Analyzer), what is the difference between source and destination port?",o:["Source = monitoring server port; destination = monitored port","Source = monitored port(s)/VLAN; destination = port connected to the analyzer/sniffer","Both can be the same port","SPAN requires a separate VLAN for operation"],a:1,e:"<strong>SPAN source</strong>: port or VLAN being monitored. <strong>SPAN destination</strong>: port connected to the network analyzer (Wireshark, IDS). Destination port drops normal forwarding while configured for SPAN."},
{d:"ASSUR",q:"What is ERSPAN used for compared to RSPAN?",o:["ERSPAN is Layer 2 only; RSPAN is Layer 3","ERSPAN encapsulates mirrored traffic in GRE and sends it across Layer 3 networks; RSPAN uses a dedicated VLAN within the same Layer 2 domain","ERSPAN requires fewer ports","RSPAN provides encryption; ERSPAN does not"],a:1,e:"<strong>ERSPAN (Encapsulated RSPAN)</strong> encapsulates mirrored traffic in GRE and can send it across Layer 3 networks to a remote analyzer. <strong>RSPAN</strong> uses a special VLAN and is limited to the same L2 domain."},
{d:"ASSUR",q:"A network monitoring system's SNMP polling fails after a router reload that added a new interface. What is the most likely cause?",o:["Community string expired","SNMP interface index (ifIndex) changed after reload","The router's SNMP agent crashed","ACL blocking SNMP traffic"],a:1,e:"When a router reloads (especially with a new interface), <strong>ifIndex values can change</strong>. SNMP NMS systems that store ifIndex for specific interfaces will query the wrong OID. Use 'snmp-server ifindex persist' to fix."},
{d:"ASSUR",q:"What is Cisco IP SLA used for?",o:["Routing protocol optimization","Active network monitoring by generating synthetic test traffic to measure latency, jitter, and availability","SNMP trap collection","BGP path verification"],a:1,e:"<strong>IP SLA</strong> generates synthetic traffic (ICMP echo, UDP jitter, HTTP, DNS, etc.) to proactively measure network performance metrics and trigger tracked objects for routing or alert purposes."},
{d:"ASSUR",q:"Which command configures a conditional debug that only outputs messages related to a specific IP address?",o:["debug ip packet detail","debug condition ip <addr>","debug ip conditional address <addr>","debug ip <addr> verbose"],a:1,e:"<strong>debug condition ip <address></strong> enables conditional debugging, filtering debug output to only show packets matching that IP. This reduces the CPU impact of debugs on production devices."},
{d:"ASSUR",q:"What is the purpose of Cisco Catalyst Center (DNA Center) AI Network Analytics?",o:["Generates device configurations","Uses ML baselines to detect network anomalies and provide guided remediation","Replaces SNMP polling entirely","Manages software upgrades only"],a:1,e:"Catalyst Center <strong>AI Network Analytics</strong> establishes dynamic baselines using ML and flags deviations as issues. It provides root cause analysis and suggests remediation steps — going beyond simple threshold alerting."},
{d:"ASSUR",q:"In RSPAN, what is the special characteristic of the RSPAN VLAN?",o:["It must be VLAN 1","It must be configured with 'remote-span' and cannot carry regular traffic; access ports assigned to it become inactive","It requires multicast to be enabled","It automatically encrypts mirrored traffic"],a:1,e:"An RSPAN VLAN is dedicated exclusively for mirror traffic. Configuring <strong>remote-span</strong> on the VLAN marks it as reserved. Any access port assigned to an RSPAN VLAN is placed in an inactive state."},
{d:"ASSUR",q:"What is the function of syslog severity level 3 (Error)?",o:["Informational messages","Critical system conditions requiring immediate action","Error conditions that need attention but the system continues","Debugging-level messages"],a:2,e:"Syslog levels: 0=Emergency, 1=Alert, 2=Critical, 3=<strong>Error</strong>, 4=Warning, 5=Notice, 6=Informational, 7=Debug. Level 3 (Error) indicates error conditions that should be investigated."},
{d:"ASSUR",q:"Which Catalyst Center API allows an engineer to run 'show' commands on managed devices remotely?",o:["SWIM API","Template Programmer API","Command Runner API","Path Trace API"],a:2,e:"The <strong>Command Runner API</strong> allows execution of read-only show commands on devices managed by Catalyst Center, returning CLI output through the REST API without direct SSH access."},
{d:"ASSUR",q:"What does a Flexible NetFlow 'flow record' define?",o:["The destination for exported flow data","The fields to match (keys) and collect (non-keys) for each flow","The sampling rate for packets","The timeout values for active and inactive flows"],a:1,e:"A <strong>flow record</strong> defines what constitutes a unique flow (key fields: src IP, dst IP, protocol, etc.) and what data to collect (non-key fields: byte counts, timestamps). This is the schema for each flow entry."},
{d:"ASSUR",q:"In Catalyst Center, what is a 'golden image' in the Software Image Management (SWIM) workflow?",o:["The newest available image for a platform","Cisco's recommended and verified software image for a specific device type","Any image that passes a compliance check","The factory default image"],a:1,e:"A <strong>golden image</strong> in Catalyst Center SWIM is the <strong>Cisco-recommended image</strong> for a specific device type. It is tagged as the standard for that platform and used for compliance checking and upgrades."},
{d:"ASSUR",q:"What is the key difference between SPAN and RSPAN?",o:["SPAN mirrors only inbound traffic; RSPAN mirrors both directions","SPAN works on a single switch; RSPAN extends monitoring traffic across trunk links to other switches","SPAN requires a license; RSPAN does not","RSPAN mirrors only control plane traffic"],a:1,e:"<strong>SPAN</strong> is local to one switch. <strong>RSPAN</strong> extends the mirrored traffic over a special VLAN through trunk links to a monitoring port on a different switch."},
{d:"ASSUR",q:"Which 'show' command displays the jitter, RTT, and packet loss results of a UDP jitter IP SLA probe?",o:["show ip sla statistics","show ip sla configuration","show ip sla summary","show ip sla history"],a:0,e:"<strong>show ip sla statistics</strong> displays the results of IP SLA operations including RTT, jitter, packet loss, and success/failure counts. Use 'show ip sla statistics aggregated' for historical data."},
{d:"ASSUR",q:"What does Catalyst Center's Path Trace feature provide?",o:["Monitors BGP route changes","Computes and visualizes the Layer 3-4 path between two hosts, showing hops and applied policies","Generates NetFlow reports","Deploys ACLs to all devices in the path"],a:1,e:"<strong>Path Trace</strong> (Flow Analysis) uses device forwarding tables to trace the actual packet path between two endpoints, showing each hop, interface, ACL matches, and QoS policies applied."},
{d:"ASSUR",q:"What is the purpose of 'show ip cef' and how does it relate to 'show ip route'?",o:["They are identical commands","show ip cef shows the Forwarding Information Base (FIB) used by hardware for fast packet forwarding; show ip route shows the RIB (control plane)","show ip cef shows MAC addresses; show ip route shows IP addresses","show ip cef is deprecated in IOS-XE"],a:1,e:"<strong>show ip route</strong> = RIB (Routing Information Base, control plane). <strong>show ip cef</strong> = FIB (Forwarding Information Base, data plane). CEF is derived from the RIB and used for hardware-based fast switching."},

// ──────────────────────────────────────────────
// 5.0 SECURITY  (20 questions)
// ──────────────────────────────────────────────
{d:"SEC",q:"Which command enables AAA authentication for console and VTY lines using RADIUS with a local fallback?",o:["aaa authentication login default radius","aaa authentication login default radius local","aaa authorization exec default radius local","aaa authentication enable default radius local"],a:1,e:"<strong>aaa authentication login default radius local</strong> tries RADIUS first; if RADIUS is unreachable, falls back to local database. 'radius' alone with no fallback would lock you out if RADIUS is down."},
{d:"SEC",q:"Which type of ACL can filter based on both source AND destination IP addresses?",o:["Standard ACL","Extended ACL","Dynamic ACL","Reflexive ACL"],a:1,e:"<strong>Extended ACLs</strong> can match source/destination IP, protocol, source/destination ports, DSCP, and more. Standard ACLs only match source IP. Extended ACLs should be placed close to the source."},
{d:"SEC",q:"What is the purpose of CoPP (Control Plane Policing)?",o:["Encrypts control plane traffic between routers","Rate-limits traffic destined to the router's CPU to protect against DoS attacks","Filters routing updates based on prefix lists","Applies QoS to transit traffic"],a:1,e:"<strong>CoPP</strong> protects the router's CPU (control plane) by policing traffic destined to the RP (routing protocols, SNMP, SSH, etc.). It prevents resource exhaustion from DoS/DDoS attacks."},
{d:"SEC",q:"Which security feature prevents an unauthorized switch from becoming the STP root bridge?",o:["BPDU Guard","Root Guard","Loop Guard","PortFast"],a:1,e:"<strong>Root Guard</strong> is configured on designated ports. If a superior BPDU is received on that port (indicating a switch is trying to become root), the port is placed into root-inconsistent state."},
{d:"SEC",q:"TrustSec uses Security Group Tags (SGTs). What is the primary benefit of SGT-based policies?",o:["They encrypt all data between endpoints","Policies are based on logical group identity rather than IP addresses, surviving network changes","They eliminate the need for VLAN segmentation","SGTs replace ACLs on all interfaces"],a:1,e:"<strong>SGTs</strong> allow policies to follow users/devices regardless of IP address or location. Policies reference group names (Employee, Contractor, IOT), not IPs — far more scalable and flexible than IP-based ACLs."},
{d:"SEC",q:"Which IEEE standard defines port-based Network Access Control (802.1X)?",o:["IEEE 802.1Q","IEEE 802.1X","IEEE 802.3af","IEEE 802.11i"],a:1,e:"<strong>IEEE 802.1X</strong> defines port-based NAC using EAP (Extensible Authentication Protocol). The authenticator (switch/AP) communicates with an authentication server (RADIUS/ISE) to grant network access."},
{d:"SEC",q:"What is MACsec (IEEE 802.1AE)?",o:["A MAC address filtering protocol","A Layer 2 encryption standard that provides hop-by-hop authentication and encryption of Ethernet frames","A MAC address rotation feature for security","A protocol for detecting MAC spoofing"],a:1,e:"<strong>MACsec (802.1AE)</strong> provides Layer 2 encryption and integrity protection for Ethernet frames between adjacent devices. It uses GCM-AES-128 or GCM-AES-256 for hop-by-hop encryption on each link."},
{d:"SEC",q:"Which command applies an extended ACL named 'BLOCK_FTP' to an interface in the inbound direction?",o:["ip access-class BLOCK_FTP in","ip access-group BLOCK_FTP in","access-list apply BLOCK_FTP in","ip inspect BLOCK_FTP in"],a:1,e:"<strong>ip access-group BLOCK_FTP in</strong> applies the named extended ACL to the interface for inbound traffic. 'ip access-class' is used on VTY lines (not interfaces)."},
{d:"SEC",q:"An ACL has 'deny tcp any host 10.1.1.1 eq 80' then 'permit ip any any'. What traffic is blocked?",o:["All TCP traffic to host 10.1.1.1","HTTP (TCP 80) traffic to host 10.1.1.1 only","All traffic to host 10.1.1.1","HTTP traffic from host 10.1.1.1"],a:1,e:"The ACL specifically denies <strong>TCP port 80 (HTTP) destined to 10.1.1.1</strong> only. All other traffic (including HTTPS, other ports, other destinations) is permitted by the implicit permit any any."},
{d:"SEC",q:"What is the primary advantage of TACACS+ over RADIUS for device administration?",o:["TACACS+ is faster","TACACS+ separates authentication, authorization, and accounting; encrypts the entire packet","RADIUS supports more authentication methods","TACACS+ works over UDP for reliability"],a:1,e:"<strong>TACACS+</strong> (TCP, port 49) encrypts the entire packet payload and separates AAA functions. RADIUS (UDP, ports 1645/1646 or 1812/1813) only encrypts the password field. TACACS+ is preferred for device management."},
{d:"SEC",q:"Which REST API security mechanism prevents man-in-the-middle attacks by verifying server identity?",o:["API key in request body","SSL/TLS certificates","Basic authentication","Rate limiting"],a:1,e:"<strong>SSL/TLS certificates</strong> prevent MITM attacks by authenticating the server. The client verifies the server's certificate against a trusted CA. Without certificate validation, traffic can be intercepted and decrypted."},
{d:"SEC",q:"What is the purpose of 'service password-encryption' in IOS?",o:["Enables AES-256 encryption for all passwords","Encrypts passwords stored in the running config using weak Type 7 (Vigenere) encryption — protects against casual shoulder surfing","Encrypts SSH sessions","Enables FIPS-compliant password hashing"],a:1,e:"<strong>service password-encryption</strong> applies Type 7 (reversible, weak) encryption to plaintext passwords in the config. It's not truly secure but prevents casual viewing. 'enable secret' uses MD5 (Type 5) — much stronger."},
{d:"SEC",q:"Which Cisco next-generation firewall feature differentiates it from a traditional stateful firewall?",o:["Packet filtering","Stateful inspection","Application visibility and malware protection (AMP)","NAT support"],a:2,e:"NGFWs add capabilities beyond stateful inspection: <strong>AVC (Application Visibility and Control), IPS/IDS, AMP (Advanced Malware Protection), URL filtering</strong>, and SSL inspection. These are absent in traditional stateful firewalls."},
{d:"SEC",q:"In AAA authorization, 'aaa authorization exec default group tacacs+ local' does what?",o:["Authenticates users with TACACS+","Checks TACACS+ to determine if the user can enter EXEC mode; falls back to local if TACACS+ is unavailable","Authorizes all commands against TACACS+","Enables accounting for exec sessions"],a:1,e:"<strong>exec authorization</strong> determines whether an authenticated user can access the privileged EXEC shell. It queries TACACS+ for privilege level assignment; falls back to local if TACACS+ is down."},
{d:"SEC",q:"Dynamic ARP Inspection (DAI) protects against which Layer 2 attack?",o:["MAC flooding","ARP spoofing/poisoning","DHCP starvation","VLAN hopping"],a:1,e:"<strong>DAI</strong> validates ARP packets against the DHCP snooping binding table. If the sender MAC/IP in an ARP reply doesn't match the binding, the frame is dropped — preventing <strong>ARP poisoning/spoofing</strong>."},
{d:"SEC",q:"Which access-list extended ACL correctly blocks FTP control (port 21) and FTP data (port 20) from subnet 10.0.2.0/24?",o:["access-list 101 deny tcp 10.0.2.0 0.0.0.255 any eq 21\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 any eq 20\naccess-list 101 permit ip any any","access-list 101 deny ftp 10.0.2.0 any","access-list 101 deny tcp any any eq ftp","access-list 101 deny ip 10.0.2.0 any eq 21"],a:0,e:"Extended ACLs require specifying protocol (tcp), source, destination, and port. FTP uses <strong>port 21 (control)</strong> and <strong>port 20 (data)</strong>. Both must be explicitly denied for full FTP blocking."},
{d:"SEC",q:"What is DHCP snooping, and which ports should be configured as trusted?",o:["DHCP snooping is a QoS feature; server ports are trusted","DHCP snooping validates DHCP messages and drops rogue DHCP server responses; only uplink ports toward legitimate DHCP servers should be trusted","DHCP snooping requires RADIUS authentication","All trunk ports should be untrusted"],a:1,e:"<strong>DHCP snooping</strong> blocks DHCP OFFER/ACK on untrusted ports (access ports facing clients). Only <strong>uplink ports toward the real DHCP server</strong> are trusted. This prevents rogue DHCP servers."},
{d:"SEC",q:"What does 'ip access-group 101 out' on a router interface mean?",o:["Filters traffic entering the interface from the network","Filters traffic leaving the interface toward the network","Applies the ACL to management traffic only","The ACL is applied bidirectionally"],a:1,e:"<strong>ip access-group out</strong> filters traffic being <strong>routed out</strong> of that interface (toward the attached network/WAN). Note: outbound router ACLs do NOT filter traffic originated by the router itself."},
{d:"SEC",q:"Which 802.1X component is responsible for passing EAP messages between the supplicant and the authentication server?",o:["Supplicant","Authentication server (RADIUS)","Authenticator (switch/AP)","AAA proxy"],a:2,e:"The <strong>authenticator</strong> (switch or AP) receives EAP frames from the supplicant via EAPOL and forwards them encapsulated in RADIUS to the authentication server. It enforces access based on the server's response."},
{d:"SEC",q:"Which IOS feature rate-limits SSH and Telnet login attempts to prevent brute-force attacks on VTY lines?",o:["login delay","login block-for X attempts Y within Z","tacacs-server timeout","service tcp-keepalives"],a:1,e:"<strong>login block-for</strong> temporarily blocks login attempts for X seconds if Y failed attempts occur within Z seconds. It also enables a quiet period mode, significantly slowing brute-force attacks."},

// ──────────────────────────────────────────────
// 6.1 PYTHON  (15 questions)
// ──────────────────────────────────────────────
{d:"PY",q:"What does this Python code output?\n<pre>data = [1, 2, 3, 4, 5]\nresult = [x * 2 for x in data if x % 2 == 0]\nprint(result)</pre>",o:["[2,4,6,8,10]","[4,8]","[2,4]","[1,3,5]"],a:1,e:"The list comprehension filters even numbers (x % 2 == 0 → 2, 4) then doubles them → <strong>[4, 8]</strong>. Odd numbers (1,3,5) are excluded by the if condition."},
{d:"PY",q:"In a Python script calling a REST API, what does 'response.status_code == 200' check?",o:["The response body is empty","The HTTP response indicates a successful GET request","The connection timed out","The request was redirected"],a:1,e:"HTTP <strong>200 OK</strong> is the standard success status for GET requests. Checking status_code == 200 verifies the API call succeeded. For POST creating a resource, check for 201."},
{d:"PY",q:"Which Python construct is used to repeatedly execute a block of code for each item in a list of device hostnames?",o:["while True","if/elif","for hostname in devices:","try/except"],a:2,e:"<strong>for ... in ...</strong> iterates over a collection. In network automation, 'for device in device_list:' is fundamental for applying the same operation (e.g., SSH connect, API call) to multiple devices."},
{d:"PY",q:"What is the output of:\n<pre>d = {'a': 1, 'b': 2}\nprint(d.get('c', 'NOT FOUND'))</pre>",o:["None","KeyError","NOT FOUND","0"],a:2,e:"<strong>dict.get(key, default)</strong> returns the default ('NOT FOUND') when the key 'c' doesn't exist. This avoids KeyError exceptions when accessing potentially missing keys in API response data."},
{d:"PY",q:"Which Python library provides SSH connectivity to Cisco IOS devices with support for CLI interaction patterns?",o:["requests","paramiko","netmiko","ncclient"],a:2,e:"<strong>netmiko</strong> is a multi-vendor SSH library that handles IOS/IOS-XE/NX-OS prompt patterns, paging (--More--), and CLI interactions. ncclient is for NETCONF/YANG. requests is for HTTP/REST APIs."},
{d:"PY",q:"A Python script has 'import json' and receives an API response. Which method converts the JSON string body to a Python dict?",o:["json.dumps(response.text)","json.loads(response.text)","json.decode(response.text)","json.parse(response.text)"],a:1,e:"<strong>json.loads()</strong> (load string) deserializes a JSON string into a Python dict/list. json.dumps() serializes a Python object to JSON string. There is no json.decode() or json.parse() in Python's standard library."},
{d:"PY",q:"What does 'verify=False' mean in a 'requests.get(url, verify=False)' call?",o:["The request will not verify the HTTP response body","SSL/TLS certificate verification is disabled","The response is not cached","Authentication is skipped"],a:1,e:"<strong>verify=False</strong> disables SSL certificate validation. Useful in lab environments with self-signed certificates. In production, always use verify=True or specify a CA bundle path to prevent MITM attacks."},
{d:"PY",q:"Which Python statement catches all exceptions generically?",o:["except Error:","except Exception as e:","catch Exception:","on error:"],a:1,e:"<strong>except Exception as e:</strong> catches all exceptions derived from the base Exception class. Using bare 'except:' is discouraged. 'as e' binds the exception object for logging/debugging."},
{d:"PY",q:"What does the following Python code do with a Catalyst Center API response?\n<pre>devices = response.json()['response']\nfor d in devices:\n    print(d['hostname'])</pre>",o:["Prints the JSON string","Prints each device's hostname from the response array","Sends a new API request for each device","Filters devices by hostname"],a:1,e:"Catalyst Center wraps data in a top-level 'response' key. <strong>response.json()['response']</strong> extracts the list of device objects. The for loop iterates over each device dict and prints the 'hostname' value."},
{d:"PY",q:"In Python, what is the difference between '==' and 'is' when comparing objects?",o:["They are identical","'==' compares values (equality); 'is' compares object identity (same memory address)","'is' is used only for None comparisons","'==' is for integers only"],a:1,e:"<strong>'=='</strong> compares values. <strong>'is'</strong> checks if two variables point to the exact same object in memory. Use 'if x is None:' (not '== None') to check for None, as recommended by PEP 8."},
{d:"PY",q:"A Python script needs to read interface data from a NETCONF device. Which library provides the ncclient connection manager?",o:["requests","paramiko","ncclient","netmiko"],a:2,e:"<strong>ncclient</strong> is the Python library for NETCONF operations. It provides the manager.connect() function and methods like get_config(), edit_config(), and get() for YANG-based device interaction."},
{d:"PY",q:"What does this Python code produce?\n<pre>x = {'vlan': 10, 'name': 'DATA'}\nprint(list(x.keys()))</pre>",o:["['vlan', 'name']","[10, 'DATA']","{'vlan': 10}","KeyError"],a:0,e:"<strong>dict.keys()</strong> returns a view of all keys. <strong>list()</strong> converts it to a list: <strong>['vlan', 'name']</strong>. This pattern is useful when iterating over or checking keys in API response dictionaries."},
{d:"PY",q:"Which Python method sends an HTTP POST request with a JSON body to a REST API?",o:["requests.get(url, json=payload)","requests.post(url, json=payload)","requests.put(url, data=payload)","requests.send(url, json=payload)"],a:1,e:"<strong>requests.post(url, json=payload)</strong> serializes the payload dict as JSON, sets Content-Type to application/json, and sends the POST request. The 'json=' parameter handles serialization automatically."},
{d:"PY",q:"A Python network script uses 'with open(\"config.txt\", \"w\") as f: f.write(data)'. What does 'w' mode do?",o:["Opens file for reading","Opens file for writing, creating it if it doesn't exist (overwrites existing content)","Appends to an existing file","Opens file in binary mode"],a:1,e:"Mode <strong>'w'</strong> opens a file for writing. If the file exists, it is truncated (overwritten). If it doesn't exist, it's created. Use 'a' for append mode or 'r' for read-only."},
{d:"PY",q:"In Python, what does 'response.raise_for_status()' do after a requests API call?",o:["Prints the HTTP status code to console","Raises an HTTPError exception if the response status code indicates a 4xx or 5xx error","Retries the request automatically","Logs the response headers"],a:1,e:"<strong>raise_for_status()</strong> checks the response status code. For 4xx client errors or 5xx server errors, it raises an <strong>HTTPError</strong> exception. This enables clean error handling in automation scripts."},

// ──────────────────────────────────────────────
// 6.2 JSON  (10 questions)
// ──────────────────────────────────────────────
{d:"JSON",q:"Which of the following is a syntactically valid JSON object?",o:['{"hostname": "R1", "enabled": true, "count": 5}','{"hostname": \'R1\', "enabled": True}','{hostname: "R1", enabled: true}','{"hostname": "R1", "enabled": TRUE}'],a:0,e:"Valid JSON requires <strong>double-quoted keys and string values</strong>, boolean <strong>lowercase (true/false)</strong>, and numeric values unquoted. Single quotes and Python-style 'True' are invalid JSON."},
{d:"JSON",q:"In a Catalyst Center API response, the data is wrapped in a top-level key. Which key is it?",o:["data","result","response","output"],a:2,e:"Catalyst Center API responses wrap the actual data in a <strong>'response'</strong> key. Scripts must access data['response'] or response.json()['response'] to get the list/object of interest."},
{d:"JSON",q:"What JSON data type correctly represents the number of BGP prefixes received: 15420?",o:['"15420"',"15420","true","null"],a:1,e:"JSON numbers are written without quotes: <strong>15420</strong>. Writing \"15420\" makes it a string, which would fail type-sensitive comparisons. Integers and floats are both valid JSON number types."},
{d:"JSON",q:"Which Python method serializes a Python dictionary to a JSON-formatted string with indentation for readability?",o:["json.loads(data)","json.dumps(data, indent=2)","json.encode(data)","json.format(data)"],a:1,e:"<strong>json.dumps(data, indent=2)</strong> converts a Python dict to a pretty-printed JSON string with 2-space indentation. Without indent, it produces a compact single-line string."},
{d:"JSON",q:"A JSON array of three interface objects looks like:",o:['{"interfaces": {"name":"Gi0","Gi1","Gi2"}}','[{"name":"Gi0"},{"name":"Gi1"},{"name":"Gi2"}]','{"interface_0":"Gi0","interface_1":"Gi1"}','("Gi0","Gi1","Gi2")'],a:1,e:"A JSON <strong>array</strong> uses square brackets and contains ordered values separated by commas. Each element here is an object (curly braces). This is the standard pattern for API responses with multiple items."},
{d:"JSON",q:"What does RFC 7951 specify regarding YANG module names in JSON encoding?",o:["Module names are omitted in JSON","Key names use module-name:leaf-name notation on first occurrence to prevent namespace conflicts","Module names replace YANG leaf names","All keys must be numeric in JSON YANG encoding"],a:1,e:"RFC 7951 (JSON Encoding of YANG Data) requires <strong>module-name:leaf-name</strong> format for the first occurrence of keys to resolve namespace conflicts between modules. Subsequent same-namespace keys omit the prefix."},
{d:"JSON",q:"What is wrong with this JSON?\n<pre>{\"vlan\": 10, \"name\": \"DATA\",}</pre>",o:["Nothing — it is valid JSON","Trailing comma after the last element is invalid JSON","The number 10 should be quoted","'vlan' key requires a string value"],a:1,e:"JSON does NOT allow <strong>trailing commas</strong>. After the last key-value pair in an object (or last element in an array), there must be no comma. This is a common error when manually editing JSON."},
{d:"JSON",q:"How is a null value represented in valid JSON?",o:["NULL","None","nil","null"],a:3,e:"JSON uses lowercase <strong>null</strong> (not Python's None, SQL's NULL, or Java's null). JSON booleans are also lowercase: true and false."},
{d:"JSON",q:"A REST API requires 'Content-Type: application/yang-data+json'. What protocol is this typically associated with?",o:["REST API with plain JSON","NETCONF","RESTCONF","GraphQL"],a:2,e:"<strong>application/yang-data+json</strong> is the RESTCONF-specific media type defined in RFC 8040. It indicates YANG-modeled data in JSON encoding. Plain REST APIs use application/json."},
{d:"JSON",q:"Which Python code correctly accesses the 'role' field from this JSON response?\n<pre>{\"response\": [{\"hostname\": \"R1\", \"role\": \"BORDER\"}]}</pre>",o:["data['response']['role']","data['response'][0]['role']","data[0]['role']","data['role']"],a:1,e:"The 'response' value is a <strong>list (array)</strong>, so you must index it: <strong>data['response'][0]['role']</strong>. Many beginners forget the [0] index when the JSON response wraps the object in an array."},

// ──────────────────────────────────────────────
// 6.3 YANG  (12 questions)
// ──────────────────────────────────────────────
